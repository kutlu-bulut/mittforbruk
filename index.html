<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mitt Forbruk v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #d1d5db; cursor: pointer; font-size: 1.8rem; padding: 0 0.1rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-pop">
            <i data-lucide="wallet" class="w-12 h-12 mx-auto mb-4 text-indigo-600"></i>
            <h2 class="text-2xl font-black mb-8 italic">Vårt Forbruk</h2>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-all">
                Logg inn med Google
            </button>
            <p id="debugInfo" class="mt-4 text-[10px] text-slate-400 font-mono"></p>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-white p-6 pb-8 border-b border-slate-200 sticky top-0 z-40">
            <div class="flex justify-between items-center mb-6">
                <h2 id="userNameDisplay" class="text-lg font-black text-indigo-600 italic uppercase">Hei!</h2>
                <button onclick="logout()" class="text-slate-300"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <span class="text-3xl font-black tracking-tighter" id="totalMonth">0 kr</span>
                    <span class="text-slate-400 text-[10px] font-bold uppercase" id="budgetLabel">Budsjett: 15k</span>
                </div>
                <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="budgetBar" class="h-full bg-indigo-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto">
            <div class="flex p-1.5 bg-slate-200/50 rounded-2xl mb-6">
                <button onclick="switchTab('feed')" id="tabFeed" class="flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all bg-white shadow-sm text-indigo-600">LOGG</button>
                <button onclick="switchTab('stats')" id="tabStats" class="flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all text-slate-500">INNSIDEN</button>
                <button onclick="switchTab('add')" id="tabAdd" class="flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all text-slate-500">REGISTRER</button>
            </div>

            <div id="sectionFeed" class="space-y-3 animate-pop">
                <div id="purchasesList" class="space-y-3 pb-20"></div>
            </div>

            <div id="sectionStats" class="hidden space-y-4 animate-pop">
                <div class="bg-indigo-600 p-6 rounded-[2rem] shadow-lg text-white">
                    <h3 class="text-[10px] font-black uppercase text-indigo-200 mb-3 tracking-widest text-center">Sett Månedsbudsjett</h3>
                    <div class="flex gap-2">
                        <input type="number" id="budgetInput" class="flex-1 p-3 bg-white/10 rounded-xl border border-white/20 outline-none font-black text-white text-center">
                        <button onclick="updateBudget()" class="bg-white text-indigo-600 px-5 rounded-xl font-black text-xs uppercase">Lagre</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <canvas id="typeChart" class="max-h-48 mx-auto"></canvas>
                </div>
            </div>

            <div id="sectionAdd" class="hidden animate-pop">
                <div class="bg-white p-7 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-4">
                    <input type="text" id="desc" placeholder="Hva er kjøpt?" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    <div class="flex gap-2">
                        <input type="number" id="price" placeholder="Pris" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-indigo-600 text-lg">
                        <div class="relative flex-1">
                            <select id="category" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-xs text-slate-500 h-full appearance-none"></select>
                            <button onclick="addCategoryPrompt()" class="absolute -top-1 -right-1 bg-indigo-600 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-lg"><i data-lucide="plus" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                    <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                        <button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all">BEHOV</button>
                        <button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all">LYST</button>
                    </div>
                    <div class="text-center py-4 bg-slate-50 rounded-3xl">
                        <div class="star-rating">
                            <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                            <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                            <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                            <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                            <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                        </div>
                    </div>
                    <button onclick="savePurchase()" class="w-full bg-indigo-600 text-white py-5 rounded-[1.8rem] font-black text-md shadow-lg uppercase">Lagre Kjøp</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ALLOWED = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'];
        const DEFAULTS = ['🛒 Mat', '🏠 Bolig', '🚗 Transport', '🛍️ Shopping', '✨ Annet'];
        let currentBudget = 15000, selectedType = 'Behov', chart = null;

        window.login = () => signInWithRedirect(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email.toLowerCase();
                if (ALLOWED.includes(email)) {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appContent').classList.remove('hidden');
                    document.getElementById('userNameDisplay').innerText = "Hei, " + user.displayName.split(' ')[0] + "!";
                    startApp();
                } else {
                    alert("Ingen tilgang for: " + email);
                    signOut(auth);
                }
            }
        });

        async function startApp() {
            // Listen for budget
            onSnapshot(doc(db, "settings", "global"), (d) => {
                if(d.exists()) {
                    currentBudget = d.data().monthlyBudget;
                    document.getElementById('budgetInput').value = currentBudget;
                    document.getElementById('budgetLabel').innerText = "Budsjett: " + Math.round(currentBudget/1000) + "k";
                }
            });

            // Listen for categories
            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '';
                DEFAULTS.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                snap.forEach(d => {
                    if(!DEFAULTS.includes(d.data().name)) sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
                });
            });

            // Listen for purchases
            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                let total = 0, n = 0, w = 0; const now = new Date();
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const date = new Date(p.createdAt);
                    if(date.getMonth() === now.getMonth()) {
                        total += p.price;
                        if(p.type === 'Behov') n += p.price; else w += p.price;
                    }
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex justify-between items-center animate-pop";
                    card.innerHTML = `<div><span class="text-[8px] font-black px-2 py-0.5 rounded-full ${p.type === 'Behov' ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'} uppercase">${p.type}</span><h3 class="font-black text-slate-800 text-sm mt-1 uppercase">${p.desc}</h3><p class="text-[9px] font-bold text-slate-300 uppercase">${p.category}</p></div><div class="text-right"><p class="font-black text-lg text-slate-800">${p.price.toLocaleString()} kr</p><div class="text-amber-400 text-[10px]">${"★".repeat(p.myRating)}</div></div>`;
                    list.appendChild(card);
                });
                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                document.getElementById('budgetBar').className = `h-full transition-all duration-1000 ${pcent > 90 ? 'bg-red-500' : 'bg-indigo-500'}`;
                updateChart(n, w); lucide.createIcons();
            });
        }

        window.updateBudget = async () => {
            const v = parseFloat(document.getElementById('budgetInput').value);
            if(v > 0) {
                await setDoc(doc(db, "settings", "global"), { monthlyBudget: v });
                alert("Budsjett lagret!");
            }
        };

        window.addCategoryPrompt = async () => {
            const n = prompt("Ny kategori:");
            if(n) await addDoc(collection(db, "categories"), { name: n.trim() });
        };

        window.savePurchase = async () => {
            const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            const r = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
            if(!d || isNaN(p) || r === 0) return alert("Fyll ut alt!");
            await addDoc(collection(db, "purchases"), { desc: d, price: p, category: document.getElementById('category').value, type: selectedType, myRating: r, buyer: auth.currentUser.displayName, createdAt: Date.now() });
            document.getElementById('desc').value = ''; document.getElementById('price').value = ''; switchTab('feed');
        };

        window.setType = (t) => {
            selectedType = t;
            document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400";
            document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400";
        };

        window.switchTab = (t) => {
            document.getElementById('sectionFeed').classList.toggle('hidden', t !== 'feed');
            document.getElementById('sectionStats').classList.toggle('hidden', t !== 'stats');
            document.getElementById('sectionAdd').classList.toggle('hidden', t !== 'add');
            document.getElementById('tabFeed').className = t === 'feed' ? "flex-1 py-2.5 rounded-xl text-[10px] font-black bg-white shadow-sm text-indigo-600" : "flex-1 py-2.5 rounded-xl text-[10px] font-black text-slate-500";
            document.getElementById('tabStats').className = t === 'stats' ? "flex-1 py-2.5 rounded-xl text-[10px] font-black bg-white shadow-sm text-indigo-600" : "flex-1 py-2.5 rounded-xl text-[10px] font-black text-slate-500";
            document.getElementById('tabAdd').className = t === 'add' ? "flex-1 py-2.5 rounded-xl text-[10px] font-black bg-white shadow-sm text-indigo-600" : "flex-1 py-2.5 rounded-xl text-[10px] font-black text-slate-500";
        };

        function updateChart(n, w) {
            const ctx = document.getElementById('typeChart'); if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Behov', 'Lyst'], datasets: [{ data: [n, w], backgroundColor: ['#6366f1', '#fbbf24'], borderWidth: 0 }] }, options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } } });
        }
        lucide.createIcons();
    </script>
</body>
</html>
