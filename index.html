<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v17.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root { --user-color: #4f46e5; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
        
        /* Dark Mode Styles */
        body.dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .bg-white { background-color: #1e293b; border-color: #334155; }
        .dark-mode header { background-color: #1e293b; border-color: #334155; }
        .dark-mode .glass-nav { background-color: rgba(30, 41, 59, 0.98); border-color: #334155; }
        .dark-mode .text-slate-900 { color: #f1f5f9; }
        .dark-mode .text-slate-400 { color: #94a3b8; }
        .dark-mode .bg-slate-50 { background-color: #0f172a; }
        .dark-mode .bg-slate-100 { background-color: #334155; }

        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-active { color: #4f46e5 !important; transform: scale(1.1); }
        .nav-active .nav-dot { opacity: 1; }
        .nav-dot { width: 4px; height: 4px; background: #4f46e5; border-radius: 50%; margin-top: 2px; opacity: 0; }
        
        .fab-shadow { box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4); }
        .brand-logo { font-style: italic; letter-spacing: -1px; }
        
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: #94a3b8; transform: scale(1.2); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-pop">
            <h1 class="text-3xl font-black mb-10 brand-logo text-indigo-600 uppercase">Vårt Forbruk</h1>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest active:scale-95 transition-all">Start med Google</button>
            <p class="mt-6 text-[8px] text-slate-300 font-mono uppercase tracking-widest">Version 17.0</p>
        </div>
    </div>

    <div id="onboardingScreen" class="hidden fixed inset-0 z-[95] bg-slate-50 flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full space-y-6 animate-pop">
            <h2 class="text-2xl font-black tracking-tighter italic">Velkommen!</h2>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                <button onclick="createHousehold()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Opprett husstand</button>
                <span class="text-slate-300 text-[9px] font-black uppercase">Eller</span>
                <input type="text" id="joinCodeInput" placeholder="Lim inn kode" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-50 outline-none text-center font-bold text-lg">
                <button onclick="joinHousehold()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Bli med</button>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-white sticky top-0 z-40 border-b border-slate-50">
            <div class="bg-indigo-600 py-3 text-center shadow-md">
                <span class="text-white font-black brand-logo uppercase tracking-tighter text-xs">Vårt Forbruk</span>
            </div>
            <div class="px-6 pt-5 pb-5">
                <div class="text-center mb-6">
                    <span id="pageTitleDisplay" class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full uppercase tracking-[0.3em]">Hjem</span>
                </div>
                <div class="flex flex-col items-center mb-6">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Forbruk totalt</span>
                    <span id="totalMonth" class="text-4xl font-black tracking-tighter leading-none">0 kr</span>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-end px-0.5">
                        <div id="budgetStatusChip" class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-md">...</div>
                        <div id="budgetLabel" class="text-[10px] font-bold text-slate-400 uppercase">Budsjett: --</div>
                    </div>
                    <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                        <div id="budgetBar" class="h-full bg-indigo-600 w-0 transition-all duration-1000"></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto pb-32">
            <div id="sectionHjem" class="tab-content active animate-pop"><div id="purchasesList" class="space-y-3"></div></div>
            
            <div id="sectionInnsikt" class="tab-content animate-pop space-y-4">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-6 italic">Fordeling</h3>
                    <div class="h-64"><canvas id="categoryChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 italic">Duellen</h3>
                    <div class="w-full h-5 bg-slate-100 rounded-full overflow-hidden flex mb-2"><div id="battleK" class="h-full bg-indigo-500 transition-all duration-700"></div><div id="battleH" class="h-full bg-rose-400 flex-1"></div></div>
                    <div class="flex justify-between font-black text-[10px] uppercase px-1"><span id="statKName">--</span><span id="statHName">--</span></div>
                </div>
            </div>

            <div id="sectionHistorikk" class="tab-content animate-pop space-y-4"><div id="historyList" class="space-y-2"></div></div>

            <div id="sectionInnstillinger" class="tab-content animate-pop space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                    <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest text-center">Husstandsinnstillinger</h4>
                    <div class="space-y-4">
                        <input type="text" id="householdNameInput" placeholder="Husstandsnavn" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-center border border-slate-50">
                        <input type="number" id="budgetInput" placeholder="Budsjett" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-center border border-slate-50">
                        <button onclick="updateHouseholdSettings()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase">Lagre Husstand</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                    <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest text-center">Kategorier</h4>
                    <div id="customCatsList" class="flex flex-wrap gap-2"></div>
                    <button onclick="addCategoryPrompt()" class="w-full p-3 border-2 border-dashed border-slate-100 rounded-xl text-slate-400 text-[10px] font-bold uppercase">+ Ny kategori</button>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h4 class="text-[10px] font-black uppercase text-indigo-600 mb-4">Invitasjonskode</h4>
                    <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl text-white">
                        <span id="displayHid" class="font-mono font-black">...</span>
                        <button onclick="copyHid()"><i data-lucide="copy" class="w-5 h-5"></i></button>
                    </div>
                    <div id="memberList" class="mt-4 text-left space-y-2"></div>
                </div>
            </div>

            <div id="sectionProfil" class="tab-content animate-pop space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-6">
                    <div class="text-center">
                        <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest mb-4">Min Profil</h4>
                        <input type="text" id="profileNameInput" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-center text-lg mb-4">
                    </div>
                    
                    <div>
                        <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 text-center">Min Signaturfarge</h4>
                        <div class="flex justify-center gap-4">
                            <div onclick="setUserColor('#6366f1')" class="color-dot bg-indigo-500" data-color="#6366f1"></div>
                            <div onclick="setUserColor('#f43f5e')" class="color-dot bg-rose-500" data-color="#f43f5e"></div>
                            <div onclick="setUserColor('#10b981')" class="color-dot bg-emerald-500" data-color="#10b981"></div>
                            <div onclick="setUserColor('#f59e0b')" class="color-dot bg-amber-500" data-color="#f59e0b"></div>
                            <div onclick="setUserColor('#8b5cf6')" class="color-dot bg-violet-500" data-color="#8b5cf6"></div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                        <span class="font-bold text-sm">Mørk Modus</span>
                        <button onclick="toggleDarkMode()" id="darkModeBtn" class="w-12 h-6 bg-slate-300 rounded-full relative transition-all">
                            <div id="darkModeDot" class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 transition-all"></div>
                        </button>
                    </div>

                    <button onclick="updateProfile()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Lagre Profil</button>
                    <button onclick="logout()" class="w-full py-2 text-rose-500 font-bold text-[10px] uppercase tracking-widest">Logg ut</button>
                </div>
            </div>

            <div id="sectionAdd" class="tab-content animate-pop">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-4"><h2 class="text-xl font-black text-indigo-600 italic uppercase">Nytt kjøp</h2><button onclick="switchTab('hjem')"><i data-lucide="x" class="w-6 h-6"></i></button></div>
                    <input type="text" id="desc" placeholder="Hva er kjøpt?" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold text-lg">
                    <input type="number" id="price" placeholder="Pris" class="w-full bg-slate-50 p-4 rounded-2xl font-black text-indigo-600 text-xl outline-none">
                    <select id="category" class="w-full bg-slate-50 p-4 rounded-2xl font-bold text-xs appearance-none outline-none"></select>
                    <div class="flex bg-slate-100 p-1.5 rounded-xl"><button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase">Behov</button><button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 uppercase">Lyst</button></div>
                    <button onclick="savePurchase()" class="w-full bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-lg active:scale-95 transition-all">Lagre Kjøpet</button>
                </div>
            </div>
        </main>

        <button onclick="switchTab('add')" id="fabAdd" class="fixed bottom-24 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center fab-shadow z-50 active:scale-90 transition-all">
            <i data-lucide="plus" class="w-8 h-8"></i>
        </button>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 px-4 pt-2 pb-8 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="switchTab('hjem')" id="nav-hjem" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Hjem</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('innsikt')" id="nav-innsikt" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="pie-chart" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Innsikt</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('historikk')" id="nav-historikk" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="history" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Historikk</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('innstillinger')" id="nav-innstillinger" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="users" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Husstand</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('profil')" id="nav-profil" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Profil</span><div class="nav-dot"></div></button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc, getDoc, getDocs, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580", authDomain: "mitt-forbruk-79b13.firebaseapp.com", projectId: "mitt-forbruk-79b13", storageBucket: "mitt-forbruk-79b13.firebasestorage.app", messagingSenderId: "383383948424", appId: "1:383383948424:web:dee99653e93b55d977a33d" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app); const provider = new GoogleAuthProvider();
        let currentHid = null, currentUserData = {}, allPurchases = [], chart = null, currentBudget = 5000, selectedType = "Behov", partnerData = {};

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const email = user.email.toLowerCase();
                if (['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'].includes(email)) {
                    await setDoc(doc(db, "users", user.uid), { hid: "original_familie", name: user.displayName.split(' ')[0], email, color: '#6366f1', darkMode: false }, { merge: true });
                }
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    if (d.exists()) {
                        currentUserData = d.data();
                        currentHid = currentUserData.hid;
                        applyUserPreferences();
                        if (currentHid) startApp(); else showOnboarding();
                    } else showOnboarding();
                });
            }
        });

        function applyUserPreferences() {
            document.body.classList.toggle('dark-mode', currentUserData.darkMode);
            const dot = document.getElementById('darkModeDot');
            const btn = document.getElementById('darkModeBtn');
            dot.style.left = currentUserData.darkMode ? '24px' : '4px';
            btn.style.backgroundColor = currentUserData.darkMode ? '#4f46e5' : '#cbd5e1';
            document.getElementById('profileNameInput').value = currentUserData.name;
            document.querySelectorAll('.color-dot').forEach(d => {
                d.classList.toggle('active', d.dataset.color === currentUserData.color);
            });
            document.documentElement.style.setProperty('--user-color', currentUserData.color);
        }

        async function startApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('onboardingScreen').classList.add('hidden');
            document.getElementById('appContent').classList.remove('hidden');
            document.getElementById('displayHid').innerText = currentHid;
            
            onSnapshot(doc(db, "households", currentHid), (d) => { if(d.exists()) document.getElementById('householdNameDisplay').innerText = d.data().name; document.getElementById('householdNameInput').value = d.data().name; });
            onSnapshot(doc(db, "households", currentHid, "settings", "global"), (d) => { if(d.exists()) { currentBudget = d.data().monthlyBudget; document.getElementById('budgetInput').value = currentBudget; document.getElementById('budgetLabel').innerText = "Budsjett: " + currentBudget.toLocaleString() + " kr"; }});
            
            // Medlemmer og Partner-data
            onSnapshot(query(collection(db, "users"), where("hid", "==", currentHid)), (snap) => {
                const list = document.getElementById('memberList'); list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    if(d.id !== auth.currentUser.uid) partnerData = { ...u, uid: d.id };
                    list.innerHTML += `<div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl"><div class="w-3 h-3 rounded-full" style="background:${u.color}"></div><span class="text-xs font-bold">${u.name}</span></div>`;
                });
            });

            onSnapshot(query(collection(db, "households", currentHid, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                let total = 0, buyerSums = {}, catSums = {}, historyMap = {}; allPurchases = [];
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const date = new Date(p.createdAt); const sortKey = `${date.getFullYear()}-${date.getMonth()}`;
                    allPurchases.push({ ...p, id: dDoc.id });
                    if(date.getMonth() === new Date().getMonth()) {
                        total += p.price; buyerSums[p.buyer] = (buyerSums[p.buyer] || 0) + p.price; catSums[p.category] = (catSums[p.category] || 0) + p.price;
                        const card = document.createElement('div'); card.className = "bg-white p-5 rounded-[1.8rem] border border-slate-50 flex flex-col gap-3 shadow-sm";
                        const isMe = p.buyer === currentUserData.name;
                        const bColor = isMe ? currentUserData.color : (partnerData.color || '#rose-400');
                        card.innerHTML = `<div class="flex justify-between items-start"><h3 class="font-black text-xs uppercase">${p.desc}</h3><p class="font-black text-lg">${p.price.toLocaleString()} kr</p></div><div class="flex gap-2"><span class="text-[7px] font-black px-2 py-1 rounded-lg bg-slate-100 text-slate-500 uppercase">${p.category}</span><span class="text-[7px] font-black px-2 py-1 rounded-lg uppercase text-white" style="background:${bColor}">${p.buyer}</span></div>`;
                        list.appendChild(card);
                    }
                });
                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                const diff = currentBudget - total;
                const chip = document.getElementById('budgetStatusChip');
                chip.innerText = diff >= 0 ? `${diff.toLocaleString()} kr under` : `${Math.abs(diff).toLocaleString()} kr over`;
                chip.className = `text-[9px] font-black uppercase px-2 py-1 rounded-md ${diff >= 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`;
                updateChart(catSums);
                updateHistory(allPurchases);
            });

            onSnapshot(query(collection(db, "households", currentHid, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '<option value="Mat">Mat</option><option value="Shopping">Shopping</option><option value="Transport">Transport</option><option value="Annet">Annet</option>';
                const adminList = document.getElementById('customCatsList'); adminList.innerHTML = '';
                snap.forEach(d => {
                    const name = d.data().name; sel.innerHTML += `<option value="${name}">${name}</option>`;
                    adminList.innerHTML += `<span class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase flex items-center gap-2 border border-indigo-100">${name} <i onclick="deleteCategory('${d.id}')" data-lucide="x" class="w-3 h-3 cursor-pointer"></i></span>`;
                });
                lucide.createIcons();
            });
        }

        window.updateProfile = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { name: document.getElementById('profileNameInput').value });
            alert("Profil lagret!");
        };
        window.setUserColor = async (c) => { await updateDoc(doc(db, "users", auth.currentUser.uid), { color: c }); };
        window.toggleDarkMode = async () => { await updateDoc(doc(db, "users", auth.currentUser.uid), { darkMode: !currentUserData.darkMode }); };
        window.updateHouseholdSettings = async () => {
            const name = document.getElementById('householdNameInput').value;
            const budget = parseFloat(document.getElementById('budgetInput').value);
            await updateDoc(doc(db, "households", currentHid), { name });
            await setDoc(doc(db, "households", currentHid, "settings", "global"), { monthlyBudget: budget });
            alert("Husstand oppdatert!");
        };
        window.savePurchase = async () => {
            const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            if(!d || isNaN(p)) return alert("Mangler data!");
            await addDoc(collection(db, "households", currentHid, "purchases"), { desc: d, price: p, category: document.getElementById('category').value, buyer: currentUserData.name, createdAt: Date.now(), type: selectedType });
            switchTab('hjem');
        };
        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
            document.getElementById('nav-' + (t === 'add' ? 'hjem' : t)).classList.add('nav-active');
            document.getElementById('pageTitleDisplay').innerText = t.charAt(0).toUpperCase() + t.slice(1);
            document.getElementById('fabAdd').classList.toggle('hidden', t === 'add');
            window.scrollTo(0,0);
        };
        function updateChart(catSums) {
            const ctx = document.getElementById('categoryChart'); if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(catSums), datasets: [{ data: Object.values(catSums), backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6'], borderWidth: 0 }] }, options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
        }
        function updateHistory(purchases) {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            const months = {};
            purchases.forEach(p => {
                const m = new Date(p.createdAt).toLocaleString('no-NO', { month: 'long', year: 'numeric' });
                months[m] = (months[m] || 0) + p.price;
            });
            Object.keys(months).forEach(m => {
                list.innerHTML += `<div class="bg-white p-5 rounded-2xl flex justify-between items-center border border-slate-50"><div><span class="font-black text-[10px] uppercase text-slate-400">${m}</span></div><span class="font-black">${months[m].toLocaleString()} kr</span></div>`;
            });
        }
        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());
        window.copyHid = () => { navigator.clipboard.writeText(currentHid); alert("Kode kopiert!"); };
        lucide.createIcons(); switchTab('hjem');
    </script>
</body>
</html>
