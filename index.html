    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        :root { --user-color: #4f46e5; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.2s; padding-bottom: env(safe-area-inset-bottom); }
        
        body.dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .bg-white { background-color: #1e293b; border-color: #334155; }
        .dark-mode header { background-color: #1e293b; border-color: #334155; }
        .dark-mode .solid-nav { background-color: #1e293b; border-color: #334155; }
        .dark-mode .text-slate-900 { color: #f1f5f9; }
        .dark-mode .bg-slate-50 { background-color: #0f172a; }

        .solid-nav { background-color: #ffffff; border-top: 1px solid #f1f5f9; height: 75px; }

        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-btn { color: #94a3b8; transition: all 0.2s ease; }
        .nav-active { color: #4f46e5 !important; }
        .nav-active .nav-inner { background-color: #eef2ff; color: #4f46e5; }
        .dark-mode .nav-btn { color: #64748b; }
        .dark-mode .nav-active { color: #818cf8 !important; }
        .dark-mode .nav-active .nav-inner { background-color: #312e81; color: #818cf8; }
        
        .brand-logo { font-style: italic; letter-spacing: -1px; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating label { color: #e2e8f0; cursor: pointer; font-size: 1.8rem; padding: 0 0.1rem; }
        .star-rating input { display: none; }
        .star-rating input:checked ~ label { color: #fbbf24; }

        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: #94a3b8; transform: scale(1.1); }
    </style>
</head>

                <button onclick="switchTab('profil')" id="nav-profil" class="nav-btn flex-1 flex justify-center"><div class="nav-inner flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl transition-all"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase tracking-widest">Profil</span></div></button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc, getDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580", authDomain: "mitt-forbruk-79b13.firebaseapp.com", projectId: "mitt-forbruk-79b13", storageBucket: "mitt-forbruk-79b13.firebasestorage.app", messagingSenderId: "383383948424", appId: "1:383383948424:web:dee99653e93b55d977a33d" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app); const provider = new GoogleAuthProvider();
        
        let currentHid = null, currentUserData = {}, currentBudget = 5000, selectedType = "Behov", selectedBuyer = "", householdMembers = [];
        let groupedHistory = {}; // Global for Månedsvisning
        
        const categoryEmojis = { "Mat": "🍔", "Shopping": "🛍️", "Transport": "🚗", "Bolig": "🏠", "Annet": "📦" };
        const profileColors = ["#6366f1", "#f43f5e", "#10b981", "#f59e0b", "#8b5cf6", "#06b6d4", "#f97316", "#ec4899", "#64748b", "#84cc16"];
        let chart = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    if (d.exists()) {
                        currentUserData = d.data(); currentHid = currentUserData.hid; 
                        renderColorPicker(); applyUserPreferences();
                        
                        if (currentHid) {
                            startApp();
                        } else {
                            document.getElementById('loginScreen').classList.add('hidden');
                            document.getElementById('appContent').classList.add('hidden');
                            document.getElementById('onboardingScreen').classList.remove('hidden');
                        }
                    } else {
                        setDoc(doc(db, "users", user.uid), { name: user.displayName.split(' ')[0], email: user.email.toLowerCase(), color: '#6366f1', darkMode: false, hid: null });
                    }
                });
            }
        });

        function renderColorPicker() {
            const container = document.getElementById('colorPickerGrid');
            if(!container) return; container.innerHTML = '';
            profileColors.forEach(color => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${currentUserData.color === color ? 'active' : ''}`;
                dot.style.backgroundColor = color;
                dot.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { color });
                container.appendChild(dot);
            });
        }

        function applyUserPreferences() {
            document.body.classList.toggle('dark-mode', currentUserData.darkMode);
            const dot = document.getElementById('darkModeDot'); if(dot) dot.style.left = currentUserData.darkMode ? '24px' : '4px';
            const btn = document.getElementById('darkModeBtn'); if(btn) btn.style.backgroundColor = currentUserData.darkMode ? '#4f46e5' : '#cbd5e1';
            document.getElementById('profileNameInput').value = currentUserData.name;
            document.documentElement.style.setProperty('--user-color', currentUserData.color);
        }

        function getBuyerColor(buyerName) {
            if (buyerName === currentUserData.name) return currentUserData.color || '#4f46e5';
            const member = householdMembers.find(m => m.name === buyerName);
            if (member) return member.color || '#f43f5e';
            const otherMember = householdMembers.find(m => m.name !== currentUserData.name);
            if (otherMember) return otherMember.color || '#f43f5e';
            return '#f43f5e';
        }

        async function startApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('onboardingScreen').classList.add('hidden');
            document.getElementById('appContent').classList.remove('hidden');
            
            document.getElementById('displayHid').innerText = currentHid;
            document.getElementById('userNameDisplay').innerText = "Hei, " + currentUserData.name + "!";
            
            onSnapshot(doc(db, "households", currentHid), (d) => { if(d.exists()) { document.getElementById('hhNameDisplay').innerText = d.data().name; document.getElementById('householdNameInput').value = d.data().name; }});
            onSnapshot(doc(db, "households", currentHid, "settings", "global"), (d) => { if(d.exists()) { currentBudget = d.data().monthlyBudget; document.getElementById('budgetInput').value = currentBudget; document.getElementById('budgetLabel').innerText = "Budsjett: " + currentBudget.toLocaleString() + " kr"; }});
            
            onSnapshot(query(collection(db, "users"), where("hid", "==", currentHid)), (snap) => {
                const list = document.getElementById('memberList'); list.innerHTML = '';
                householdMembers = [];
                snap.forEach(d => { 
                    const u = d.data(); 
                    householdMembers.push(u); 
                    list.innerHTML += `<div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-1"><div class="w-2.5 h-2.5 rounded-full" style="background:${u.color}"></div><span class="text-xs font-bold">${u.name}</span></div>`;
                });
                
                const p = householdMembers.find(m => m.name !== currentUserData.name);
                if(p) document.getElementById('btnBuyer2').innerText = p.name;
                
                if (!selectedBuyer) {
                    window.setBuyerToggle(true); 
                }
            });

            onSnapshot(query(collection(db, "households", currentHid, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = ''; 
                let total = 0, buyerSums = {}, catSums = {}, all = [];
                const now = new Date();
                
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt); all.push({ ...p, id });
                    
                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price; 
                        buyerSums[p.buyer] = (buyerSums[p.buyer] || 0) + p.price; 
                        catSums[p.category] = (catSums[p.category] || 0) + p.price;
                        
                        const card = document.createElement('div'); card.className = "bg-white p-5 rounded-[1.8rem] border border-slate-50 shadow-sm active:scale-95 cursor-pointer transition-all";
                        card.onclick = () => editMode(id, p.store, p.desc, p.price, p.category, p.type, p.buyer, p.rating, p.createdAt);
                        
                        let bColor = getBuyerColor(p.buyer);
                        const dateStr = date.toLocaleDateString('no-NO', { day: '2-digit', month: '2-digit' });
                        const emojiStr = categoryEmojis[p.category] ? categoryEmojis[p.category] + " " : "";
                        const ratingStr = p.rating ? `<span class="text-[7px] font-black text-amber-500 bg-amber-50 px-2 py-1 rounded-lg uppercase flex items-center gap-0.5">★ ${p.rating}</span>` : "";
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start">
                                <div class="flex flex-col">
                                    <div class="flex items-center gap-2">
                                        <h3 class="font-black text-xs uppercase text-slate-900">${p.store || 'Butikk'}</h3>
                                        <span class="text-[9px] font-black text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">${dateStr}</span>
                                    </div>
                                    <p class="text-[10px] text-slate-400 font-bold mt-0.5">${p.desc}</p>
                                </div>
                                <p class="font-black text-lg text-slate-900">${p.price.toLocaleString()} kr</p>
                            </div>
                            <div class="flex flex-wrap gap-2 mt-3">
                                <span class="text-[7px] font-black px-2 py-1 rounded-lg ${ (p.type||'Behov') ==='Behov'?'bg-emerald-50 text-emerald-600':'bg-amber-50 text-amber-600'} uppercase">${p.type||'Behov'}</span>
                                <span class="text-[7px] font-black px-2 py-1 rounded-lg bg-slate-100 text-slate-500 uppercase">${emojiStr}${p.category}</span>
                                <span class="text-[7px] font-black px-2 py-1 rounded-lg uppercase text-white" style="background:${bColor}">${p.buyer}</span>
                                ${ratingStr}
                            </div>
                        `;
                        list.appendChild(card);
                    }
                });
                
                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                document.getElementById('budgetBar').style.width = Math.min((total / (currentBudget||1)) * 100, 100) + "%";
                const diff = currentBudget - total; document.getElementById('budgetStatusChip').innerText = diff >= 0 ? `${diff.toLocaleString()} kr under` : `${Math.abs(diff).toLocaleString()} kr over`;
                document.getElementById('budgetStatusChip').className = `text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-md ${diff >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600 font-extrabold'}`;
                
                updateDuellen(buyerSums);
                updateHistory(all);
                updateChart(catSums);
            });

            onSnapshot(query(collection(db, "households", currentHid, "categories"), orderBy("name")), (snap) => {
                const defaults = ["Mat", "Shopping", "Transport", "Bolig", "Annet"];
                const sel = document.getElementById('category'); const adminList = document.getElementById('customCatsList');
                sel.innerHTML = ''; adminList.innerHTML = '';
                defaults.forEach(cat => {
                    const emojiStr = categoryEmojis[cat] ? categoryEmojis[cat] + " " : ""; 
                    sel.innerHTML += `<option value="${cat}">${emojiStr}${cat}</option>`;
                    adminList.innerHTML += `<span class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-slate-200">${emojiStr}${cat}</span>`;
                });
                snap.forEach(d => {
                    const name = d.data().name; if (!defaults.includes(name)) { 
                        sel.innerHTML += `<option value="${name}">${name}</option>`; 
                        adminList.innerHTML += `<span onclick="editCategoryPrompt('${d.id}', '${name}')" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase flex items-center gap-2 border border-indigo-100 cursor-pointer transition-all active:scale-95">${name} <i onclick="event.stopPropagation(); deleteCategory('${d.id}')" data-lucide="x" class="w-3 h-3 text-rose-500 bg-rose-50 rounded-full p-0.5 ml-1"></i></span>`; 
                    }
                });
                lucide.createIcons();
            });
        }

        window.setBuyerToggle = (isMe) => {
            const btn1 = document.getElementById('btnBuyer1');
            const btn2 = document.getElementById('btnBuyer2');
            
            const p = householdMembers.find(m => m.name !== currentUserData.name) || { name: 'Partner', color: '#f43f5e' };
            selectedBuyer = isMe ? currentUserData.name : p.name;

            btn1.style.backgroundColor = 'transparent'; btn1.style.color = '#94a3b8'; btn1.style.boxShadow = 'none';
            btn2.style.backgroundColor = 'transparent'; btn2.style.color = '#94a3b8'; btn2.style.boxShadow = 'none';

            if (isMe) {
                btn1.style.backgroundColor = currentUserData.color || '#4f46e5';
                btn1.style.color = 'white';
                btn1.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.1)';
            } else {
                btn2.style.backgroundColor = p.color || '#f43f5e';
                btn2.style.color = 'white';
                btn2.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.1)';
            }
        };

        window.syncBuyerUI = (dbName) => {
            window.setBuyerToggle(dbName === currentUserData.name);
        };

        function updateDuellen(buyerSums) {
            let m1Name = currentUserData.name;
            let m1Color = currentUserData.color || "#4f46e5";
            let m1Sum = buyerSums[m1Name] || 0;

            let p = householdMembers.find(m => m.name !== currentUserData.name) || { name: 'Partner', color: '#f43f5e' };
            let m2Name = p.name;
            let m2Color = p.color || '#f43f5e';
            
            let m2Sum = 0;
            Object.keys(buyerSums).forEach(name => {
                if(name !== currentUserData.name) m2Sum += buyerSums[name];
            });

            document.getElementById('statKName').innerText = `${m1Name}: ${m1Sum.toLocaleString()} kr`;
            document.getElementById('statHName').innerText = `${m2Name}: ${m2Sum.toLocaleString()} kr`;

            let totalDuel = m1Sum + m2Sum;
            if (totalDuel === 0) {
                document.getElementById('battleK').style.width = "50%"; document.getElementById('battleK').style.backgroundColor = '#e2e8f0'; document.getElementById('battleH').style.backgroundColor = '#e2e8f0';
            } else {
                document.getElementById('battleK').style.width = `${(m1Sum / totalDuel) * 100}%`; document.getElementById('battleK').style.backgroundColor = m1Color; document.getElementById('battleH').style.backgroundColor = m2Color;
            }
        }

        // --- NY HISTORIKK LOGIKK ---
        function updateHistory(purchases) { 
            const list = document.getElementById('historyList'); 
            list.innerHTML = ''; 
            groupedHistory = {}; 
            
            purchases.forEach(p => { 
                const d = new Date(p.createdAt);
                const sortKey = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
                const displayName = d.toLocaleString('no-NO', { month: 'long', year: 'numeric' }); 
                if(!groupedHistory[sortKey]) groupedHistory[sortKey] = { label: displayName, total: 0, items: [] };
                groupedHistory[sortKey].total += p.price;
                groupedHistory[sortKey].items.push(p);
            }); 
            
            const sortedKeys = Object.keys(groupedHistory).sort().reverse();
            if(sortedKeys.length === 0) { list.innerHTML = '<p class="text-center text-xs font-bold text-slate-400 uppercase mt-10">Ingen historikk enda</p>'; return; }

            sortedKeys.forEach(k => { 
                const m = groupedHistory[k];
                list.innerHTML += `
                <div onclick="openMonth('${k}')" class="bg-white p-6 rounded-3xl flex justify-between items-center border border-slate-50 mb-3 shadow-sm cursor-pointer active:scale-95 transition-all">
                    <span class="font-black text-sm uppercase text-slate-900 tracking-widest">${m.label}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-lg text-indigo-600">${m.total.toLocaleString()} kr</span>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                    </div>
                </div>`;
            }); 
            lucide.createIcons();
        }

        window.openMonth = (key) => {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('sectionHistorikkDetaljer').classList.add('active');
            
            const m = groupedHistory[key];
            document.getElementById('historikkDetaljerTitle').innerText = m.label;
            
            const detailList = document.getElementById('historikkDetaljerList');
            detailList.innerHTML = '';
            
            m.items.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[1.8rem] border border-slate-50 shadow-sm cursor-pointer active:scale-95 transition-all";
                card.onclick = () => editMode(p.id, p.store, p.desc, p.price, p.category, p.type, p.buyer, p.rating, p.createdAt);

                let bColor = getBuyerColor(p.buyer);
                const dateStr = new Date(p.createdAt).toLocaleDateString('no-NO', { day: '2-digit', month: '2-digit' });
                const emojiStr = categoryEmojis[p.category] ? categoryEmojis[p.category] + " " : "";
                const ratingStr = p.rating ? `<span class="text-[7px] font-black text-amber-500 bg-amber-50 px-2 py-1 rounded-lg uppercase flex items-center gap-0.5">★ ${p.rating}</span>` : "";

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-2">
                                <h3 class="font-black text-xs uppercase text-slate-900">${p.store || 'Butikk'}</h3>
                                <span class="text-[9px] font-black text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">${dateStr}</span>
                            </div>
                            <p class="text-[10px] text-slate-400 font-bold mt-0.5">${p.desc}</p>
                        </div>
                        <p class="font-black text-lg text-slate-900">${p.price.toLocaleString()} kr</p>
                    </div>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <span class="text-[7px] font-black px-2 py-1 rounded-lg ${ (p.type||'Behov') ==='Behov'?'bg-emerald-50 text-emerald-600':'bg-amber-50 text-amber-600'} uppercase">${p.type||'Behov'}</span>
                        <span class="text-[7px] font-black px-2 py-1 rounded-lg bg-slate-100 text-slate-500 uppercase">${emojiStr}${p.category}</span>
                        <span class="text-[7px] font-black px-2 py-1 rounded-lg uppercase text-white" style="background:${bColor}">${p.buyer}</span>
                        ${ratingStr}
                    </div>
                `;
                detailList.appendChild(card);
            });
            window.scrollTo(0,0);
        };

        window.backToHistorikk = () => { switchTab('historikk'); };

        function updateChart(catSums) { 
            const ctx = document.getElementById('categoryChart'); 
            if(chart) chart.destroy(); 
            if(Object.keys(catSums).length === 0) {
                chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Ingen kjøp'], datasets: [{ data: [1], backgroundColor: ['#f8fafc'], borderWidth: 0 }] }, options: { cutout: '80%', maintainAspectRatio: false, plugins: { tooltip: {enabled: false}, legend: { display: false } } } });
                return;
            }
            chart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(catSums), datasets: [{ data: Object.values(catSums), backgroundColor: profileColors, borderWidth: 0 }] }, options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter', weight: 'bold', size: 10 } } } } } }); 
        }

        window.editCategoryPrompt = async (id, current) => { const n = prompt("Endre kategorinavn:", current); if(n && n !== current) await updateDoc(doc(db, "households", currentHid, "categories", id), { name: n.trim() }); };
        
        window.openNewPurchase = () => { cancelEdit(); switchTab('add'); };
        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            
            document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
            
            const navBtn = document.getElementById('nav-' + t); 
            if(navBtn) navBtn.classList.add('nav-active');
            
            const displayTitle = t === 'innstillinger' ? 'Husstand' : t.charAt(0).toUpperCase() + t.slice(1);
            document.getElementById('pageTitleDisplay').innerText = displayTitle;
            
            document.getElementById('fabAdd').classList.toggle('hidden', t === 'add');
            window.scrollTo(0,0);
        };

        window.editMode = (id, store, desc, price, cat, type, buyer, rating, time) => { 
            switchTab('add'); document.getElementById('editId').value = id; document.getElementById('dateInput').value = new Date(time).toISOString().split('T')[0];
            document.getElementById('store').value = store || ''; document.getElementById('desc').value = desc || ''; document.getElementById('price').value = price; document.getElementById('category').value = cat; 
            if(rating) document.getElementById('star' + rating).checked = true; setType(type||'Behov'); window.syncBuyerUI(buyer); document.getElementById('formTitle').innerText = "Endre kjøp"; document.getElementById('btnDeleteForm').classList.remove('hidden'); 
        };
        window.savePurchase = async () => { 
            const id = document.getElementById('editId').value, dInput = document.getElementById('dateInput').value, s = document.getElementById('store').value, d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value); 
            const rate = document.querySelector('input[name="rating"]:checked')?.value || 0;
            if(!d || isNaN(p) || !dInput) return alert("Mangler data!"); 
            const obj = { store: s, desc: d, price: p, category: document.getElementById('category').value, buyer: selectedBuyer, createdAt: new Date(dInput).getTime(), type: selectedType, rating: parseInt(rate) }; 
            if(id) await updateDoc(doc(db, "households", currentHid, "purchases", id), obj); else await addDoc(collection(db, "households", currentHid, "purchases"), obj); cancelEdit(); switchTab('hjem'); 
        };
        window.deleteCurrentEdit = async () => { if(confirm("Slette?")) { await deleteDoc(doc(db, "households", currentHid, "purchases", document.getElementById('editId').value)); cancelEdit(); switchTab('hjem'); } };
        window.cancelEdit = () => { 
            document.getElementById('editId').value = ''; document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            document.getElementById('store').value = ''; document.getElementById('desc').value = ''; document.getElementById('price').value = ''; 
            document.getElementById('btnDeleteForm').classList.add('hidden'); document.getElementById('formTitle').innerText = "Nytt kjøp"; 
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false); window.setBuyerToggle(true); setType('Behov'); 
        };
        window.setType = (t) => { selectedType = t; document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase text-slate-900" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 uppercase"; document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase text-slate-900" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 uppercase"; };
        window.toggleDarkMode = async () => { await updateDoc(doc(db, "users", auth.currentUser.uid), { darkMode: !currentUserData.darkMode }); };
        window.updateProfile = async () => { await updateDoc(doc(db, "users", auth.currentUser.uid), { name: document.getElementById('profileNameInput').value }); alert("Profil lagret!"); };
        window.updateHouseholdSettings = async () => { await updateDoc(doc(db, "households", currentHid), { name: document.getElementById('householdNameInput').value }); await setDoc(doc(db, "households", currentHid, "settings", "global"), { monthlyBudget: parseFloat(document.getElementById('budgetInput').value) }); alert("Lagret!"); };
        window.addCategoryPrompt = async () => { const n = prompt("Kategori:"); if(n) await addDoc(collection(db, "households", currentHid, "categories"), { name: n.trim() }); };
        window.deleteCategory = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "households", currentHid, "categories", id)); };
        
        window.createHousehold = async () => { const hid = "H-" + Math.random().toString(36).substr(2, 6).toUpperCase(); await setDoc(doc(db, "households", hid), { name: "Min husstand", migrated: true }); await setDoc(doc(db, "users", auth.currentUser.uid), { hid: hid }, { merge: true }); location.reload(); };
        window.joinHousehold = async () => { const c = document.getElementById('joinCodeInput').value.trim(); if(c) { await setDoc(doc(db, "users", auth.currentUser.uid), { hid: c }, { merge: true }); location.reload(); } };
        window.copyHid = () => { navigator.clipboard.writeText(currentHid); alert("Kode kopiert!"); };

        window.login = () => signInWithPopup(auth, provider); window.logout = () => signOut(auth).then(() => location.reload());
        
        lucide.createIcons(); switchTab('hjem');
    </script>
</body>
</html>
