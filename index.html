<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v15.13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #e2e8f0; cursor: pointer; font-size: 1.5rem; padding: 0 0.1rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .nav-active { color: #4f46e5 !important; transform: scale(1.1); }
        .nav-active span { font-weight: 900 !important; }
        .nav-dot { width: 4px; height: 4px; background: #4f46e5; border-radius: 50%; margin-top: 2px; opacity: 0; }
        .nav-active .nav-dot { opacity: 1; }
        .brand-logo { font-style: italic; letter-spacing: -1px; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-3xl p-10 shadow-2xl animate-pop">
            <h1 class="text-3xl font-black mb-10 brand-logo text-indigo-600 uppercase">Vårt Forbruk</h1>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest">Åpne appen</button>
            <p class="mt-6 text-[8px] text-slate-300 font-mono uppercase tracking-widest">Version 15.13</p>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-white sticky top-0 z-40 border-b border-slate-100 shadow-sm">
            <div class="bg-indigo-600 py-1.5 text-center">
                <span class="text-white font-black brand-logo uppercase tracking-tighter text-[9px]">Vårt Forbruk</span>
            </div>

            <div class="px-5 pt-4 pb-4 space-y-3">
                <div class="flex justify-between items-center">
                    <h2 id="userNameDisplay" class="text-lg font-black text-slate-800 italic tracking-tighter">Hei, ...</h2>
                    <span id="budgetLabel" class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Budsjett: --</span>
                </div>

                <div class="flex items-center justify-between gap-3">
                    <span id="totalMonth" class="text-3xl font-black tracking-tighter text-slate-900 leading-none">0 kr</span>
                    <div id="budgetStatusChip" class="px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest whitespace-nowrap">...</div>
                </div>

                <div class="space-y-1">
                    <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden border border-slate-50">
                        <div id="budgetBar" class="h-full bg-indigo-600 w-0 transition-all duration-1000"></div>
                    </div>
                    <div class="flex justify-between">
                        <h1 id="pageTitleDisplay" class="text-[8px] font-black text-slate-300 uppercase tracking-[0.2em]">Oversikt</h1>
                        <span class="text-[8px] text-slate-300 font-bold uppercase tracking-widest">Denne måneden</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto pb-32">
            <div id="sectionOversikt" class="tab-content active animate-pop"><div id="purchasesList" class="space-y-3"></div></div>
            <div id="sectionAnalyse" class="tab-content animate-pop space-y-4">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 text-center italic">Kategorier</h3>
                    <div class="h-64"><canvas id="categoryChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic">Forbruks-duellen</h3>
                    <div class="w-full h-4 bg-slate-100 rounded-full overflow-hidden flex mb-2">
                        <div id="battleK" class="h-full bg-indigo-500 transition-all duration-700" style="width: 50%"></div>
                        <div id="battleH" class="h-full bg-rose-400 flex-1"></div>
                    </div>
                    <div class="flex justify-between font-black text-[10px] uppercase px-1">
                        <span class="text-indigo-600">Kutlu: <span id="statKSum">0</span></span>
                        <span class="text-rose-500">Hulya: <span id="statHSum">0</span></span>
                    </div>
                </div>
            </div>
            <div id="sectionArkiv" class="tab-content animate-pop space-y-4">
                <div id="historyListView"><div id="historyList" class="space-y-2"></div></div>
                <div id="historyDetailView" class="hidden space-y-4">
                    <button onclick="closeHistoryDetail()" class="flex items-center gap-2 text-indigo-600 font-bold text-xs uppercase"><i data-lucide="chevron-left" class="w-4 h-4"></i> Tilbake</button>
                    <h3 id="historyDetailTitle" class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">...</h3>
                    <div id="historyDetailList" class="space-y-2"></div>
                </div>
            </div>
            <div id="sectionInnstillinger" class="tab-content animate-pop space-y-5">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-8">
                    <div>
                        <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest mb-3">Månedsbudsjett</h4>
                        <input type="number" id="budgetInput" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-2xl text-center mb-2">
                        <button onclick="updateBudget()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Lagre Budsjett</button>
                    </div>
                    <div class="pt-6 border-t">
                        <h4 class="text-[10px] font-black uppercase text-indigo-600 mb-4 tracking-widest">Kategorier</h4>
                        <div id="customCatsList" class="flex flex-wrap gap-2 mb-4"></div>
                        <button onclick="addCategoryPrompt()" class="w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-[10px] font-bold uppercase">+ Ny kategori</button>
                    </div>
                    <button onclick="logout()" class="w-full py-2 text-slate-300 font-bold text-[9px] uppercase tracking-[0.3em]">Logg ut</button>
                </div>
            </div>

            <div id="sectionAdd" class="tab-content animate-pop">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                        <h2 id="formTitle" class="text-xl font-black text-indigo-600 italic uppercase">Nytt kjøp</h2>
                        <button onclick="cancelEdit()" id="btnCancel" class="hidden text-slate-400 text-[10px] font-black uppercase">Avbryt</button>
                    </div>
                    <input type="hidden" id="editId">
                    <div class="space-y-5">
                        <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                            <button onclick="setBuyer('Kutlu')" id="btnBuyerK" class="flex-1 py-3 rounded-xl text-xs font-black transition-all uppercase tracking-widest">Kutlu</button>
                            <button onclick="setBuyer('Hulya')" id="btnBuyerH" class="flex-1 py-3 rounded-xl text-xs font-black transition-all uppercase tracking-widest">Hulya</button>
                        </div>
                        <input type="text" id="desc" placeholder="Hva har du kjøpt?" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold text-lg border border-transparent focus:border-indigo-100">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="price" placeholder="Pris" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-black text-indigo-600 text-xl">
                            <select id="category" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold text-xs appearance-none"></select>
                        </div>
                        <div class="flex bg-slate-100 p-1.5 rounded-xl">
                            <button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase">Behov</button>
                            <button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase">Lyst</button>
                        </div>
                        <div class="text-center bg-slate-50 py-5 rounded-3xl">
                            <div class="star-rating">
                                <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                                <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                                <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                                <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                                <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                            </div>
                        </div>
                        <button onclick="savePurchase()" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-lg uppercase tracking-widest">Lagre Kjøpet</button>
                        <button onclick="deleteCurrentEdit()" id="btnDeleteForm" class="hidden w-full text-rose-500 py-2 font-bold text-[9px] uppercase tracking-widest">Slett dette kjøpet</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 px-4 pt-2 pb-8 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="switchTab('oversikt')" id="nav-oversikt" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1 transition-all">
                    <i data-lucide="layout-grid" class="w-6 h-6"></i>
                    <span class="text-[7px] font-black uppercase">Oversikt</span>
                    <div class="nav-dot"></div>
                </button>
                <button onclick="switchTab('analyse')" id="nav-analyse" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1 transition-all">
                    <i data-lucide="bar-chart-3" class="w-6 h-6"></i>
                    <span class="text-[7px] font-black uppercase">Analyse</span>
                    <div class="nav-dot"></div>
                </button>
                <button onclick="switchTab('arkiv')" id="nav-arkiv" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1 transition-all">
                    <i data-lucide="archive" class="w-6 h-6"></i>
                    <span class="text-[7px] font-black uppercase">Arkiv</span>
                    <div class="nav-dot"></div>
                </button>
                <button onclick="switchTab('innstillinger')" id="nav-innstillinger" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1 transition-all">
                    <i data-lucide="settings-2" class="w-6 h-6"></i>
                    <span class="text-[7px] font-black uppercase">Profil</span>
                    <div class="nav-dot"></div>
                </button>
                <button onclick="switchTab('add')" id="nav-add" class="bg-slate-900 text-white px-4 py-2 rounded-2xl flex items-center gap-2 shadow-xl active:scale-90 transition-all ml-2">
                    <i data-lucide="plus" class="w-4 h-4"></i><span class="text-[8px] font-black uppercase tracking-tight">Nytt</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'];
        const FIXED_CATS = ['Mat', 'Bolig', 'Transport', 'Shopping', 'Annet'];
        let currentBudget = 5000, selectedType = 'Behov', selectedBuyer = 'Kutlu', chart = null, allPurchases = [];

        setPersistence(auth, browserLocalPersistence);
        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Hei, " + user.displayName.split(' ')[0] + "!";
                const firstName = user.displayName.split(' ')[0];
                setBuyer(firstName.includes('ulut') || firstName.includes('utlu') ? 'Kutlu' : 'Hulya');
                startApp();
            }
        });

        async function startApp() {
            const now = new Date();
            const monthNames = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
            
            onSnapshot(doc(db, "settings", "global"), (d) => {
                if(d.exists()) {
                    currentBudget = d.data().monthlyBudget;
                    document.getElementById('budgetInput').value = currentBudget;
                    document.getElementById('budgetLabel').innerText = "Budsjett: " + currentBudget.toLocaleString() + " kr";
                }
            });

            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '';
                const adminList = document.getElementById('customCatsList'); adminList.innerHTML = '';
                FIXED_CATS.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                snap.forEach(d => {
                    const name = d.data().name;
                    if(!FIXED_CATS.includes(name)) {
                        sel.innerHTML += `<option value="${name}">${name}</option>`;
                        adminList.innerHTML += `<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase flex items-center gap-2 border border-indigo-100"><span onclick="editCategoryPrompt('${d.id}', '${name}')">${name}</span> <i onclick="deleteCategory('${d.id}')" data-lucide="x" class="w-3 h-3 cursor-pointer"></i></span>`;
                    }
                });
                lucide.createIcons();
            });

            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                const histList = document.getElementById('historyList'); histList.innerHTML = '';
                let total = 0, kSum = 0, hSum = 0, catSums = {}, historyMap = {};
                allPurchases = [];

                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt);
                    const sortKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    const displayKey = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
                    allPurchases.push({ ...p, id, date });
                    if(!historyMap[sortKey]) historyMap[sortKey] = { label: displayKey, sum: 0 };
                    historyMap[sortKey].sum += p.price;

                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price;
                        if(p.buyer.toLowerCase().includes('kutlu')) kSum += p.price; else hSum += p.price;
                        catSums[p.category] = (catSums[p.category] || 0) + p.price;

                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-[1.8rem] border border-slate-100 flex flex-col gap-2 shadow-sm animate-pop active:scale-[0.98] transition-all cursor-pointer";
                        card.onclick = () => editMode(id, p.desc, p.price, p.category, p.type, p.myRating, p.buyer);
                        
                        const buyerColor = p.buyer.toLowerCase().includes('kutlu') ? 'bg-indigo-50 text-indigo-600' : 'bg-rose-50 text-rose-500';
                        const typeColor = p.type === 'Behov' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600';

                        card.innerHTML = `<div class="flex justify-between items-start"><h3 class="font-black text-slate-900 text-xs uppercase tracking-tight">${p.desc}</h3><p class="font-black text-base text-slate-900 tracking-tighter">${p.price.toLocaleString()} kr</p></div><div class="flex flex-wrap gap-2"><span class="text-[6px] font-black px-1.5 py-0.5 rounded-md ${typeColor} uppercase tracking-widest">${p.type}</span><span class="text-[6px] font-black px-1.5 py-0.5 rounded-md bg-slate-100 text-slate-500 uppercase tracking-widest">${p.category}</span><span class="text-[6px] font-black px-1.5 py-0.5 rounded-md ${buyerColor} uppercase tracking-widest">${p.buyer}</span></div>`;
                        list.appendChild(card);
                    }
                });

                Object.keys(historyMap).sort().reverse().forEach(key => {
                    const h = historyMap[key];
                    const row = document.createElement('div');
                    row.className = "bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm cursor-pointer active:bg-slate-50 transition-all";
                    row.onclick = () => showHistoryDetail(h.label);
                    row.innerHTML = `<div class="flex flex-col"><span class="font-black text-slate-900 uppercase text-[9px] tracking-widest">${h.label}</span><span class="text-[7px] font-bold text-indigo-400 uppercase">Se detaljer</span></div><span class="font-black text-slate-900 text-base tracking-tighter">${h.sum.toLocaleString()} kr</span>`;
                    histList.appendChild(row);
                });

                const diff = currentBudget - total;
                const chip = document.getElementById('budgetStatusChip');
                if(diff >= 0) {
                    chip.innerText = `${diff.toLocaleString()} kr under`;
                    chip.className = "px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest bg-emerald-100 text-emerald-700 whitespace-nowrap shadow-sm";
                } else {
                    chip.innerText = `${Math.abs(diff).toLocaleString()} kr over`;
                    chip.className = "px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest bg-rose-100 text-rose-700 font-black whitespace-nowrap shadow-sm";
                }

                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                document.getElementById('budgetBar').style.backgroundColor = pcent > 90 ? '#ef4444' : '#4f46e5';
                document.getElementById('statKSum').innerText = kSum.toLocaleString() + " kr";
                document.getElementById('statHSum').innerText = hSum.toLocaleString() + " kr";
                document.getElementById('battleK').style.width = total > 0 ? (kSum / total * 100) + "%" : "50%";
                updateChart(catSums); lucide.createIcons();
            });
        }

        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            const targetId = 'section' + (t === 'oversikt' ? 'Oversikt' : t === 'analyse' ? 'Analyse' : t === 'arkiv' ? 'Arkiv' : t === 'innstillinger' ? 'Innstillinger' : 'Add');
            document.getElementById(targetId).classList.add('active');
            document.getElementById('nav-' + t).classList.add('nav-active');
            if(t !== 'add') document.getElementById('pageTitleDisplay').innerText = t.charAt(0).toUpperCase() + t.slice(1);
            if(t === 'arkiv') closeHistoryDetail();
            window.scrollTo(0,0);
        };

        window.setBuyer = (b) => {
            selectedBuyer = b;
            const kBtn = document.getElementById('btnBuyerK'), hBtn = document.getElementById('btnBuyerH');
            if(b === 'Kutlu') {
                kBtn.className = "flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-lg uppercase tracking-widest";
                hBtn.className = "flex-1 py-3 rounded-xl text-xs font-black text-slate-400 uppercase tracking-widest";
            } else {
                kBtn.className = "flex-1 py-3 rounded-xl text-xs font-black text-slate-400 uppercase tracking-widest";
                hBtn.className = "flex-1 py-3 rounded-xl text-xs font-black bg-rose-400 text-white shadow-lg uppercase tracking-widest";
            }
        };

        window.showHistoryDetail = (monthLabel) => {
            const detailView = document.getElementById('historyDetailView'), listView = document.getElementById('historyListView'), detailList = document.getElementById('historyDetailList');
            document.getElementById('historyDetailTitle').innerText = monthLabel;
            detailList.innerHTML = '';
            const filtered = allPurchases.filter(p => {
                const d = new Date(p.createdAt);
                const monthNames = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
                return `${monthNames[d.getMonth()]} ${d.getFullYear()}` === monthLabel;
            });
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center mb-2 shadow-sm";
                card.innerHTML = `<div><h3 class="font-bold text-slate-800 text-xs uppercase tracking-tight">${p.desc}</h3><p class="text-[8px] font-bold text-slate-400 uppercase">${p.category} • ${p.buyer}</p></div><div class="text-right"><p class="font-black text-slate-900">${p.price.toLocaleString()} kr</p></div>`;
                detailList.appendChild(card);
            });
            listView.classList.add('hidden'); detailView.classList.remove('hidden');
        };

        window.closeHistoryDetail = () => { document.getElementById('historyDetailView').classList.add('hidden'); document.getElementById('historyListView').classList.remove('hidden'); };
        window.savePurchase = async () => {
            const id = document.getElementById('editId').value, d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            const r = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
            if(!d || isNaN(p) || r === 0) return alert("Fyll ut alt!");
            const obj = { desc: d, price: p, category: document.getElementById('category').value, type: selectedType, myRating: r, buyer: selectedBuyer, createdAt: Date.now() };
            if(id) await updateDoc(doc(db, "purchases", id), obj); else await addDoc(collection(db, "purchases"), obj);
            cancelEdit(); switchTab('oversikt');
        };
        window.editMode = (id, desc, price, cat, type, rate, buyer) => {
            switchTab('add'); document.getElementById('editId').value = id; document.getElementById('desc').value = desc;
            document.getElementById('price').value = price; document.getElementById('category').value = cat;
            window.setType(type); window.setBuyer(buyer || 'Kutlu');
            document.getElementById(`star${rate}`).checked = true; document.getElementById('formTitle').innerText = "Endre kjøp";
            document.getElementById('btnCancel').classList.remove('hidden'); document.getElementById('btnDeleteForm').classList.remove('hidden');
        };
        window.deleteCurrentEdit = async () => { const id = document.getElementById('editId').value; if(id && confirm("Slette kjøp?")) { await deleteDoc(doc(db, "purchases", id)); cancelEdit(); switchTab('oversikt'); } };
        window.cancelEdit = () => { document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('price').value = ''; document.getElementById('formTitle').innerText = "Nytt kjøp"; document.getElementById('btnCancel').classList.add('hidden'); document.getElementById('btnDeleteForm').classList.add('hidden'); document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false); };
        window.setType = (t) => { selectedType = t; document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase"; document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase"; };
        function updateChart(catSums) { const ctx = document.getElementById('categoryChart'); if(chart) chart.destroy(); const labels = Object.keys(catSums); const data = Object.values(catSums); if(labels.length === 0) return; chart = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#6366f1', '#fbbf24', '#10b981', '#f43f5e', '#8b5cf6', '#0ea5e9'], borderWidth: 0 }] }, options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } } } }); }
        window.updateBudget = async () => { const v = parseFloat(document.getElementById('budgetInput').value); if(v > 0) { await setDoc(doc(db, "settings", "global"), { monthlyBudget: v }); alert("Lagret!"); } };
        window.addCategoryPrompt = async () => { const n = prompt("Ny kategori:"); if(n) await addDoc(collection(db, "categories"), { name: n.trim() }); };
        window.deleteCategory = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "categories", id)); };
        lucide.createIcons();
        switchTab('oversikt');
    </script>
</body>
</html>
