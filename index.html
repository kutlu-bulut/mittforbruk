<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #e2e8f0; cursor: pointer; font-size: 1.5rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl animate-pop">
            <h2 class="text-3xl font-black mb-8 italic tracking-tighter">Vårt Forbruk</h2>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3">Logg inn med Google</button>
            <p class="mt-6 text-[8px] text-slate-300 font-mono tracking-widest">VERSION 11.0</p>
        </div>
    </div>

    <div id="appContent" class="hidden flex flex-col min-h-screen">
        
        <header class="bg-white px-4 pt-10 pb-4 sticky top-0 z-40 border-b border-slate-100">
            <div class="flex justify-between items-center mb-3">
                <h2 id="userNameDisplay" class="text-lg font-black text-indigo-600 italic">...</h2>
                <span class="text-[8px] bg-slate-100 text-slate-400 font-mono px-2 py-1 rounded">v11.0</span>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl shadow-xl">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-2xl font-black text-white tracking-tighter" id="totalMonth">0 kr</span>
                    <span class="text-indigo-300 text-[10px] font-bold uppercase tracking-widest" id="budgetLabel">Budsjett: --</span>
                </div>
                <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                    <div id="budgetBar" class="h-full bg-indigo-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <main class="flex-1 p-3 max-w-md mx-auto w-full pb-32">
            
            <div id="sectionFeed" class="space-y-2 animate-pop">
                <div id="purchasesList" class="space-y-2"></div>
            </div>

            <div id="sectionStats" class="hidden space-y-4 animate-pop">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-50">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 text-center">Kategorifordeling</h3>
                    <canvas id="categoryChart" class="max-h-48 mx-auto"></canvas>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-50">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 text-center">Bruk pr. person</h3>
                    <div class="w-full h-5 bg-slate-50 rounded-full overflow-hidden flex border border-slate-100">
                        <div id="battleK" class="h-full bg-indigo-500 transition-all duration-700" style="width: 50%"></div>
                        <div id="battleH" class="h-full bg-rose-400 flex-1"></div>
                    </div>
                    <div class="flex justify-between mt-3 font-black text-xs">
                        <span class="text-indigo-600">KUTLU: <span id="statKSum">0</span></span>
                        <span class="text-rose-500">HULYA: <span id="statHSum">0</span></span>
                    </div>
                </div>
            </div>

            <div id="sectionAdd" class="hidden animate-pop">
                <div class="bg-white p-6 rounded-3xl shadow-2xl space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 id="formTitle" class="text-xl font-black text-indigo-600">Nytt kjøp</h2>
                        <button onclick="cancelEdit()" id="btnCancel" class="hidden text-rose-500 text-[10px] font-black uppercase">Avbryt</button>
                    </div>
                    <input type="hidden" id="editId">
                    <input type="text" id="desc" placeholder="Beskrivelse" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="price" placeholder="Pris" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-black text-indigo-600 text-lg">
                        <div class="relative">
                            <select id="category" class="w-full bg-slate-50 p-4 rounded-xl outline-none font-bold text-xs appearance-none h-full"></select>
                            <button onclick="addCategoryPrompt()" class="absolute -top-1 -right-1 bg-indigo-600 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-lg"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-3 rounded-lg text-[10px] font-black bg-white shadow-sm uppercase">Behov</button>
                        <button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-3 rounded-lg text-[10px] font-black text-slate-400 uppercase">Lyst</button>
                    </div>
                    <div class="text-center py-4 bg-slate-50 rounded-2xl">
                        <div class="star-rating">
                            <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                            <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                            <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                            <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                            <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                        </div>
                    </div>
                    <button onclick="savePurchase()" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest">Lagre</button>
                </div>
            </div>

            <div id="sectionAdmin" class="hidden animate-pop space-y-4">
                <div class="bg-white p-6 rounded-3xl space-y-6">
                    <div>
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-3">Månedsbudsjett</h4>
                        <div class="flex gap-2">
                            <input type="number" id="budgetInput" class="flex-1 p-4 bg-slate-50 rounded-xl outline-none font-black text-xl">
                            <button onclick="updateBudget()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold text-xs uppercase">OK</button>
                        </div>
                    </div>
                    <div class="pt-4 border-t">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-3">Egne kategorier</h4>
                        <div id="customCatsList" class="flex flex-wrap gap-2 mb-4"></div>
                        <button onclick="addCategoryPrompt()" class="w-full p-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-[10px] font-bold uppercase">Ny kategori</button>
                    </div>
                    <button onclick="logout()" class="w-full p-4 bg-rose-50 text-rose-500 rounded-xl font-black text-xs uppercase">Logg ut</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 px-4 pt-3 pb-8 z-50">
            <div class="grid grid-cols-4 items-center max-w-md mx-auto relative">
                <button onclick="switchTab('feed')" id="nav-feed" class="flex flex-col items-center gap-1 text-indigo-600"><i data-lucide="list" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">Logg</span></button>
                <button onclick="switchTab('stats')" id="nav-stats" class="flex flex-col items-center gap-1 text-slate-300"><i data-lucide="pie-chart" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">Innsikt</span></button>
                <button onclick="switchTab('admin')" id="nav-admin" class="flex flex-col items-center gap-1 text-slate-300"><i data-lucide="settings" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">Profil</span></button>
                <button onclick="switchTab('add')" id="nav-add" class="absolute left-1/2 -translate-x-1/2 -translate-y-8 bg-slate-900 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-xl active:scale-90 transition-all"><i data-lucide="plus" class="w-8 h-8"></i></button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'];
        const FIXED_CATS = ['🛒 Mat', '🏠 Bolig', '🚗 Transport', '🛍️ Shopping', '✨ Annet'];
        let currentBudget = 15000, selectedType = 'Behov', chart = null;

        setPersistence(auth, browserLocalPersistence);

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Hei, " + user.displayName.split(' ')[0] + "!";
                startApp();
            }
        });

        async function startApp() {
            onSnapshot(doc(db, "settings", "global"), (d) => {
                if(d.exists()) {
                    currentBudget = d.data().monthlyBudget;
                    document.getElementById('budgetInput').value = currentBudget;
                    document.getElementById('budgetLabel').innerText = "Budsjett: " + Math.round(currentBudget/1000) + "k";
                }
            });

            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '';
                const adminList = document.getElementById('customCatsList'); adminList.innerHTML = '';
                FIXED_CATS.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                snap.forEach(d => {
                    const name = d.data().name;
                    if(!FIXED_CATS.includes(name)) {
                        sel.innerHTML += `<option value="${name}">${name}</option>`;
                        adminList.innerHTML += `<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase flex items-center gap-2">${name} <span onclick="deleteCategory('${d.id}')" class="cursor-pointer">✕</span></span>`;
                    }
                });
                lucide.createIcons();
            });

            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                let total = 0, kSum = 0, hSum = 0, catSums = {};
                const now = new Date();
                
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt);
                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price;
                        if(p.buyer.toLowerCase().includes('kutlu') || p.buyer.toLowerCase().includes('bulut')) kSum += p.price; else hSum += p.price;
                        const c = p.category || '✨ Annet';
                        catSums[c] = (catSums[c] || 0) + p.price;
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-2xl border border-slate-50 flex justify-between items-center shadow-sm animate-pop";
                    card.innerHTML = `
                        <div class="flex-1">
                            <span class="text-[7px] font-black px-2 py-0.5 rounded-full ${p.type === 'Behov' ? 'bg-indigo-50 text-indigo-600' : 'bg-amber-50 text-amber-600'} uppercase">${p.type || 'Behov'}</span>
                            <h3 class="font-bold text-slate-800 text-sm mt-1">${p.desc}</h3>
                            <p class="text-[8px] font-bold text-slate-400 uppercase mt-0.5">${p.category || 'Annet'} • ${p.buyer.split(' ')[0]}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-[15px] text-slate-900">${p.price.toLocaleString()} kr</p>
                            <div class="flex gap-4 justify-end mt-2">
                                <button onclick="editMode('${id}', '${p.desc}', ${p.price}, '${p.category}', '${p.type}', ${p.myRating})" class="text-slate-300">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                                <button onclick="deletePurchase('${id}')" class="text-slate-300">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>`;
                    list.appendChild(card);
                });

                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                document.getElementById('statKSum').innerText = kSum.toLocaleString() + " kr";
                document.getElementById('statHSum').innerText = hSum.toLocaleString() + " kr";
                document.getElementById('battleK').style.width = total > 0 ? (kSum / total * 100) + "%" : "50%";
                updateChart(catSums);
                lucide.createIcons();
            });
        }

            window.updateBudget = async () => {
            const v = parseFloat(document.getElementById('budgetInput').value);
            if(v > 0) await setDoc(doc(db, "settings", "global"), { monthlyBudget: v });
            alert("Budsjett oppdatert!");
        };

        window.addCategoryPrompt = async () => {
            const n = prompt("Ny kategori:");
            if(n) await addDoc(collection(db, "categories"), { name: n.trim() });
        };

        window.deleteCategory = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "categories", id)); };

        window.savePurchase = async () => {
            const id = document.getElementById('editId').value;
            const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            const r = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
            if(!d || isNaN(p) || r === 0) return alert("Mangler info!");
            const obj = { desc: d, price: p, category: document.getElementById('category').value, type: selectedType, myRating: r, buyer: auth.currentUser.displayName, createdAt: Date.now() };
            if(id) await updateDoc(doc(db, "purchases", id), obj);
            else await addDoc(collection(db, "purchases"), obj);
            cancelEdit(); switchTab('feed');
        };

        window.editMode = (id, desc, price, cat, type, rate) => {
            switchTab('add');
            document.getElementById('editId').value = id; document.getElementById('desc').value = desc;
            document.getElementById('price').value = price; document.getElementById('category').value = cat;
            window.setType(type); document.getElementById(`star${rate}`).checked = true;
            document.getElementById('formTitle').innerText = "Endre kjøp"; document.getElementById('btnCancel').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('price').value = '';
            document.getElementById('formTitle').innerText = "Nytt kjøp"; document.getElementById('btnCancel').classList.add('hidden');
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
        };

        window.setType = (t) => {
            selectedType = t;
            document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-3 rounded-lg text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3 rounded-lg text-[10px] font-black text-slate-400 transition-all uppercase";
            document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-3 rounded-lg text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3 rounded-lg text-[10px] font-black text-slate-400 transition-all uppercase";
        };

        window.switchTab = (t) => {
            ['sectionFeed', 'sectionStats', 'sectionAdd', 'sectionAdmin'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
            ['nav-feed', 'nav-stats', 'nav-admin'].forEach(n => document.getElementById(n).className = "flex flex-col items-center gap-1 text-slate-300");
            if(t !== 'add') document.getElementById('nav-' + t).className = "flex flex-col items-center gap-1 text-indigo-600";
            window.scrollTo(0,0);
        };

        window.deletePurchase = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "purchases", id)); };

        function updateChart(catSums) {
            const ctx = document.getElementById('categoryChart'); if(chart) chart.destroy();
            const labels = Object.keys(catSums); const data = Object.values(catSums);
            if(labels.length === 0) return;
            chart = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#6366f1', '#fbbf24', '#10b981', '#f43f5e', '#8b5cf6'], borderWidth: 0 }] }, options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9, weight: 'bold' } } } } } });
        }
        lucide.createIcons();
    </script>
</body>
</html>
