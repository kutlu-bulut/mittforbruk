<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min App - Stabil Versjon</title>
    <style>
        /* Grunnleggende farger for lys modus */
        :root {
            --bg: #ffffff;
            --text: #222222;
            --card: #f0f0f0;
            --border: #cccccc;
        }

        /* Farger for mørk modus */
        body.dark-mode {
            --bg: #121212;
            --text: #ffffff;
            --card: #1e1e1e;
            --border: #333333;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
            transition: 0.2s;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }

        /* Profil-sirkelen */
        #avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            background: var(--bg);
            color: var(--text);
        }

        .color-picker {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .dot.active {
            border-color: var(--text);
            transform: scale(1.1);
        }

        .btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="avatar">?</div>
    <h2 id="greeting">Hei!</h2>

    <label for="nameInput">Ditt navn:</label>
    <input type="text" id="nameInput" placeholder="Skriv inn navn..." oninput="updateName(this.value)">

    <p>Velg din farge:</p>
    <div class="color-picker" id="colorOptions">
        </div>

    <button class="btn" onclick="toggleMode()">Bytt Lys/Mørk modus</button>
</div>

<script>
    // 1. Definer fargene våre
    const palette = ['#e74c3c', '#2ecc71', '#3498db', '#f1c40f', '#9b59b6', '#34495e'];

    // 2. Hent lagrede data eller sett standardverdier
    let currentName = localStorage.getItem('userName') || "";
    let currentColor = localStorage.getItem('userColor') || palette[Math.floor(Math.random() * palette.length)];
    let isDark = localStorage.getItem('darkMode') === 'true';

    // 3. Funksjon for å oppdatere alt i grensesnittet
    function render() {
        // Oppdater tekst
        document.getElementById('greeting').innerText = currentName ? `Hei, ${currentName}!` : "Hei!";
        document.getElementById('avatar').innerText = currentName ? currentName.charAt(0).toUpperCase() : "?";
        document.getElementById('nameInput').value = currentName;

        // Oppdater farger
        document.getElementById('avatar').style.backgroundColor = currentColor;
        
        // Oppdater mørk modus
        document.body.classList.toggle('dark-mode', isDark);

        // Tegn fargevalgene på nytt
        const picker = document.getElementById('colorOptions');
        picker.innerHTML = '';
        palette.forEach(color => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (color === currentColor ? ' active' : '');
            dot.style.backgroundColor = color;
            dot.onclick = () => updateColor(color);
            picker.appendChild(dot);
        });
    }

    // 4. Handlinger
    function updateName(val) {
        currentName = val;
        localStorage.setItem('userName', val);
        render();
    }

    function updateColor(color) {
        currentColor = color;
        localStorage.setItem('userColor', color);
        render();
    }

    function toggleMode() {
        isDark = !isDark;
        localStorage.setItem('darkMode', isDark);
        render();
    }

    // Kjør ved start
    render();
</script>

</body>
</html>
