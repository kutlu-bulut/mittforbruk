<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v14.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #e2e8f0; cursor: pointer; font-size: 1.5rem; padding: 0 0.1rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-3xl p-10 shadow-2xl animate-pop">
            <h1 class="text-3xl font-black mb-10 italic tracking-tighter">Vårt Forbruk</h1>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest">Start appen</button>
            <p class="mt-6 text-[8px] text-slate-300 font-mono uppercase tracking-widest">Version 14.1</p>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-white px-6 pt-12 pb-4 sticky top-0 z-40 border-b border-slate-100">
            <div class="flex justify-between items-baseline mb-3">
                <h2 id="userNameDisplay" class="text-lg font-black text-indigo-600 italic uppercase tracking-tighter">...</h2>
                <span class="text-[8px] bg-indigo-50 text-indigo-400 font-mono px-2 py-1 rounded">v14.1</span>
            </div>
            <div class="flex justify-between items-center font-black">
                <div class="flex flex-col">
                    <span id="headerLabelText" class="text-[9px] text-slate-400 uppercase tracking-tighter">Brukt hittil</span>
                    <span id="totalMonth" class="text-2xl tracking-tighter text-slate-900">0 kr</span>
                </div>
                <div class="text-right">
                    <span id="budgetLabel" class="text-[10px] text-slate-400 uppercase">Budsjett: --</span>
                    <div class="w-24 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden border border-slate-50">
                        <div id="budgetBar" class="h-full bg-indigo-500 w-0 transition-all duration-1000"></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto pb-32">
            <div id="sectionFeed" class="tab-content active animate-pop">
                <div id="purchasesList" class="space-y-3"></div>
            </div>
            
            <div id="sectionStats" class="tab-content animate-pop space-y-4">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Kategorier (Denne mnd)</h3>
                    <div class="h-56"><canvas id="categoryChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic">Forbruks-duellen</h3>
                    <div class="w-full h-5 bg-slate-100 rounded-full overflow-hidden flex mb-2 border border-slate-50">
                        <div id="battleK" class="h-full bg-indigo-500 transition-all duration-700" style="width: 50%"></div>
                        <div id="battleH" class="h-full bg-rose-400 flex-1"></div>
                    </div>
                    <div class="flex justify-between font-black text-[10px] uppercase px-1">
                        <span class="text-indigo-600">Kutlu: <span id="statKSum">0</span></span>
                        <span class="text-rose-500">Hulya: <span id="statHSum">0</span></span>
                    </div>
                </div>
            </div>

            <div id="sectionHistory" class="tab-content animate-pop space-y-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Alle måneder</h3>
                <div id="historyList" class="space-y-2"></div>
            </div>

            <div id="sectionAdmin" class="tab-content animate-pop space-y-5">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 space-y-6">
                    <div class="space-y-4">
                        <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest">Månedsbudsjett</h4>
                        <div class="flex flex-col gap-3">
                            <input type="number" id="budgetInput" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-2xl border border-slate-100 text-center">
                            <button onclick="updateBudget()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">Oppdater Budsjett</button>
                        </div>
                    </div>
                    <div class="pt-6 border-t border-slate-100">
                        <h4 class="text-[10px] font-black uppercase text-indigo-600 mb-4 tracking-widest">Kategorier (Trykk for å endre)</h4>
                        <div id="customCatsList" class="flex flex-wrap gap-2 mb-4"></div>
                        <button onclick="addCategoryPrompt()" class="w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-[10px] font-bold uppercase flex items-center justify-center gap-2 hover:bg-slate-50 transition-all">
                           <i data-lucide="plus-circle" class="w-4 h-4"></i> Ny kategori
                        </button>
                    </div>
                    <button onclick="logout()" class="w-full py-4 text-slate-300 font-bold text-[9px] uppercase tracking-[0.3em] hover:text-rose-500 transition-all">Logg ut</button>
                </div>
            </div>

            <div id="sectionAdd" class="tab-content animate-pop">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                        <h2 id="formTitle" class="text-xl font-black text-indigo-600 italic">Registrer kjøp</h2>
                        <button onclick="cancelEdit()" id="btnCancel" class="hidden text-rose-500 text-[10px] font-black uppercase">Avbryt</button>
                    </div>
                    <input type="hidden" id="editId">
                    <div class="space-y-5">
                        <input type="text" id="desc" placeholder="Hva er kjøpt?" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold text-lg focus:ring-2 ring-indigo-500/20 transition-all">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="price" placeholder="Pris" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-black text-indigo-600 text-xl">
                            <div class="relative">
                                <select id="category" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold text-xs h-full appearance-none"></select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
                            </div>
                        </div>
                        <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                            <button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase">Behov</button>
                            <button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase">Lyst</button>
                        </div>
                        <div class="text-center bg-slate-50 py-5 rounded-3xl">
                             <p class="text-[9px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Glede & Verdi</p>
                            <div class="star-rating">
                                <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                                <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                                <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                                <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                                <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                            </div>
                        </div>
                        <button onclick="savePurchase()" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-lg uppercase tracking-widest active:scale-95 transition-all">Lagre Kjøp</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 px-4 pt-3 pb-8 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="switchTab('feed')" id="nav-feed" class="flex flex-col items-center gap-1 text-indigo-600 flex-1">
                    <i data-lucide="layout-list" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Logg</span>
                </button>
                <button onclick="switchTab('stats')" id="nav-stats" class="flex flex-col items-center gap-1 text-slate-300 flex-1">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Innsikt</span>
                </button>
                <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center gap-1 text-slate-300 flex-1">
                    <i data-lucide="calendar" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase tracking-tighter">Historikk</span>
                </button>
                <button onclick="switchTab('admin')" id="nav-admin" class="flex flex-col items-center gap-1 text-slate-300 flex-1">
                    <i data-lucide="user" class="w-5 h-5"></i><span class="text-[7px] font-black uppercase">Profil</span>
                </button>
                <button onclick="switchTab('add')" id="nav-add" class="bg-slate-900 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 shadow-xl active:scale-90 transition-all ml-2">
                    <i data-lucide="plus" class="w-4 h-4"></i><span class="text-[8px] font-black uppercase tracking-tight">Nytt</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'];
        const FIXED_CATS = ['🛒 Mat', '🏠 Bolig', '🚗 Transport', '🛍️ Shopping', '✨ Annet'];
        let currentBudget = 15000, selectedType = 'Behov', chart = null;

        setPersistence(auth, browserLocalPersistence);

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = user.displayName.split(' ')[0];
                startApp();
            }
        });

        async function startApp() {
            const now = new Date();
            const monthNames = ["januar", "februar", "mars", "april", "mai", "juni", "juli", "august", "september", "oktober", "november", "desember"];
            document.getElementById('headerLabelText').innerText = "Brukt hittil i " + monthNames[now.getMonth()];

            onSnapshot(doc(db, "settings", "global"), (d) => {
                if(d.exists()) {
                    currentBudget = d.data().monthlyBudget;
                    document.getElementById('budgetInput').value = currentBudget;
                    document.getElementById('budgetLabel').innerText = "Budsjett: " + Math.round(currentBudget/1000) + "k";
                }
            });

            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '';
                const adminList = document.getElementById('customCatsList'); adminList.innerHTML = '';
                FIXED_CATS.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                snap.forEach(d => {
                    const name = d.data().name;
                    if(!FIXED_CATS.includes(name)) {
                        sel.innerHTML += `<option value="${name}">${name}</option>`;
                        adminList.innerHTML += `<span class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase flex items-center gap-2 shadow-sm border border-indigo-100">
                            <span onclick="editCategoryPrompt('${d.id}', '${name}')">${name}</span> <i onclick="deleteCategory('${d.id}')" data-lucide="x" class="w-3 h-3 cursor-pointer"></i>
                        </span>`;
                    }
                });
                lucide.createIcons();
            });

            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                const histList = document.getElementById('historyList'); histList.innerHTML = '';
                let total = 0, kSum = 0, hSum = 0, catSums = {}, historyData = {};

                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt);
                    const monthKey = monthNames[date.getMonth()] + " " + date.getFullYear();
                    
                    historyData[monthKey] = (historyData[monthKey] || 0) + p.price;

                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price;
                        if(p.buyer.toLowerCase().includes('kutlu') || p.buyer.toLowerCase().includes('bulut')) kSum += p.price; else hSum += p.price;
                        const c = p.category || '✨ Annet';
                        catSums[c] = (catSums[c] || 0) + p.price;

                        const card = document.createElement('div');
                        card.className = "bg-white p-5 rounded-[2rem] border border-slate-50 flex justify-between items-center shadow-sm animate-pop";
                        card.innerHTML = `
                            <div class="flex-1">
                                <span class="text-[7px] font-black px-2 py-0.5 rounded-full ${p.type === 'Behov' ? 'bg-indigo-50 text-indigo-600' : 'bg-amber-50 text-amber-600'} uppercase">${p.type || 'Behov'}</span>
                                <h3 class="font-bold text-slate-800 text-sm mt-1">${p.desc}</h3>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${p.category || 'Annet'} • ${p.buyer.split(' ')[0]}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-lg text-slate-900">${p.price.toLocaleString()} kr</p>
                                <div class="flex gap-4 justify-end mt-2">
                                    <button onclick="editMode('${id}', '${p.desc}', ${p.price}, '${p.category}', '${p.type}', ${p.myRating})" class="text-slate-200 hover:text-indigo-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button onclick="deletePurchase('${id}')" class="text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>`;
                        list.appendChild(card);
                    }
                });

                if(list.innerHTML === '') {
                    list.innerHTML = '<div class="text-center py-12 text-slate-300 font-bold uppercase text-[10px]">Ingen kjøp i ' + monthNames[now.getMonth()] + ' ennå</div>';
                }

                Object.keys(historyData).sort((a,b) => new Date(b) - new Date(a)).forEach(key => {
                    const row = document.createElement('div');
                    row.className = "bg-white p-5 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm";
                    row.innerHTML = `<span class="font-bold text-[10px] uppercase text-slate-400">${key}</span><span class="font-black text-slate-900">${historyData[key].toLocaleString()} kr</span>`;
                    histList.appendChild(row);
                });

                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                document.getElementById('budgetBar').style.backgroundColor = pcent > 90 ? '#ef4444' : '#6366f1';
                document.getElementById('statKSum').innerText = kSum.toLocaleString() + " kr";
                document.getElementById('statHSum').innerText = hSum.toLocaleString() + " kr";
                document.getElementById('battleK').style.width = total > 0 ? (kSum / total * 100) + "%" : "50%";
                updateChart(catSums);
                lucide.createIcons();
            });
        }

        window.updateBudget = async () => {
            const v = parseFloat(document.getElementById('budgetInput').value);
            if(v > 0) {
                await setDoc(doc(db, "settings", "global"), { monthlyBudget: v });
                alert("Budsjett oppdatert!");
            }
        };

        window.addCategoryPrompt = async () => {
            const n = prompt("Ny kategori:");
            if(n) await addDoc(collection(db, "categories"), { name: n.trim() });
        };

        window.editCategoryPrompt = async (id, oldName) => {
            const newName = prompt("Endre kategori:", oldName);
            if(newName && newName !== oldName) await updateDoc(doc(db, "categories", id), { name: newName.trim() });
        };

        window.deleteCategory = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "categories", id)); };

        window.savePurchase = async () => {
            const id = document.getElementById('editId').value;
            const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            const r = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
            if(!d || isNaN(p) || r === 0) return alert("Fyll ut alt!");
            const obj = { desc: d, price: p, category: document.getElementById('category').value, type: selectedType, myRating: r, buyer: auth.currentUser.displayName, createdAt: Date.now() };
            if(id) await updateDoc(doc(db, "purchases", id), obj);
            else await addDoc(collection(db, "purchases"), obj);
            cancelEdit(); switchTab('feed');
        };

        window.editMode = (id, desc, price, cat, type, rate) => {
            switchTab('add');
            document.getElementById('editId').value = id; document.getElementById('desc').value = desc;
            document.getElementById('price').value = price; document.getElementById('category').value = cat;
            window.setType(type); document.getElementById(`star${rate}`).checked = true;
            document.getElementById('formTitle').innerText = "Endre kjøp"; document.getElementById('btnCancel').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('price').value = '';
            document.getElementById('formTitle').innerText = "Registrer kjøp"; document.getElementById('btnCancel').classList.add('hidden');
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
        };

        window.setType = (t) => {
            selectedType = t;
            document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase";
            document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase";
        };

        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
            ['nav-feed', 'nav-stats', 'nav-history', 'nav-admin'].forEach(n => {
                const el = document.getElementById(n);
                el.classList.remove('text-indigo-600');
                el.classList.add('text-slate-300');
            });
            if(t !== 'add') document.getElementById('nav-' + t).classList.add('text-indigo-600');
            window.scrollTo(0,0);
        };

        function updateChart(catSums) {
            const ctx = document.getElementById('categoryChart'); if(chart) chart.destroy();
            const labels = Object.keys(catSums); const data = Object.values(catSums);
            if(labels.length === 0) return;
            chart = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#6366f1', '#fbbf24', '#10b981', '#f43f5e', '#8b5cf6', '#0ea5e9'], borderWidth: 0 }] }, options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } } } });
        }
        window.deletePurchase = async (id) => { if(confirm("Slette permanent?")) await deleteDoc(doc(db, "purchases", id)); };
        lucide.createIcons();
    </script>
</body>
</html>
