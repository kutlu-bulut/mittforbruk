<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v16.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .nav-active { color: #4f46e5 !important; transform: scale(1.1); }
        .nav-active span { font-weight: 900 !important; }
        .nav-dot { width: 4px; height: 4px; background: #4f46e5; border-radius: 50%; margin-top: 2px; opacity: 0; }
        .nav-active .nav-dot { opacity: 1; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating label { color: #e2e8f0; cursor: pointer; font-size: 1.5rem; padding: 0 0.1rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .brand-logo { font-style: italic; letter-spacing: -1px; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-pop">
            <h1 class="text-3xl font-black mb-10 brand-logo text-indigo-600 uppercase">Vårt Forbruk</h1>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest active:scale-95 transition-all">Logg inn med Google</button>
            <p class="mt-6 text-[8px] text-slate-300 font-mono uppercase tracking-widest">Version 16.6 Migration</p>
        </div>
    </div>

    <div id="onboardingScreen" class="hidden fixed inset-0 z-[95] bg-slate-50 flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full space-y-6 animate-pop">
            <h2 class="text-2xl font-black tracking-tighter italic">Nesten klar!</h2>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                <button onclick="createHousehold()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Opprett husstand</button>
                <span class="text-slate-300 text-[9px] font-black uppercase">Eller</span>
                <div class="space-y-3">
                    <input type="text" id="joinCodeInput" placeholder="Lim inn kode" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-50 outline-none text-center font-bold text-lg">
                    <button onclick="joinHousehold()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Bli med</button>
                </div>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-white sticky top-0 z-40 border-b border-slate-50">
            <div class="bg-indigo-600 py-4 text-center shadow-md">
                <span class="text-white font-black brand-logo uppercase tracking-tighter text-sm">Vårt Forbruk</span>
            </div>
            <div class="px-6 pt-5 pb-5">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 id="userNameDisplay" class="text-xl font-extrabold text-slate-900 italic tracking-tighter leading-none">Hei, ...</h2>
                        <p id="householdNameDisplay" class="text-[8px] font-bold text-slate-400 uppercase mt-1 italic tracking-widest">Laster...</p>
                    </div>
                    <span id="pageTitleDisplay" class="text-[8px] font-black text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md uppercase tracking-[0.2em]">Oversikt</span>
                </div>
                <div class="flex flex-col mb-6">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Forbruk</span>
                    <span id="totalMonth" class="text-4xl font-black tracking-tighter text-slate-900 leading-none">0 kr</span>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-end px-0.5">
                        <div id="budgetStatusChip" class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-md transition-all duration-300">...</div>
                        <div id="budgetLabel" class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Budsjett: --</div>
                    </div>
                    <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                        <div id="budgetBar" class="h-full bg-indigo-600 w-0 transition-all duration-1000"></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto pb-32">
            <div id="sectionOversikt" class="tab-content active animate-pop"><div id="purchasesList" class="space-y-3"></div></div>
            <div id="sectionInnsikt" class="tab-content animate-pop space-y-4">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 italic">Kategorier</h3>
                    <div class="h-64"><canvas id="categoryChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic">Duellen</h3>
                    <div class="w-full h-5 bg-slate-100 rounded-full overflow-hidden flex mb-2"><div id="battleK" class="h-full bg-indigo-500 transition-all duration-700"></div><div id="battleH" class="h-full bg-rose-400 flex-1"></div></div>
                    <div class="flex justify-between font-black text-[10px] uppercase px-1"><span id="statKName" class="text-indigo-600">--</span><span id="statHName" class="text-rose-500">--</span></div>
                </div>
            </div>
            <div id="sectionHistorikk" class="tab-content animate-pop space-y-4"><div id="historyListView"><div id="historyList" class="space-y-2"></div></div></div>
            <div id="sectionInnstillinger" class="tab-content animate-pop space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 text-center">
                    <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest">Husstandsnavn</h4>
                    <input type="text" id="householdNameInput" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-center border border-slate-50 focus:border-indigo-100">
                    <button onclick="updateHouseholdName()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest">Lagre navn</button>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 text-center">
                    <h4 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest">Invitasjonskode</h4>
                    <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl">
                        <span id="displayHid" class="font-mono font-black text-white text-lg">...</span>
                        <button onclick="copyHid()" class="text-white"><i data-lucide="copy" class="w-5 h-5"></i></button>
                    </div>
                    <div id="memberList" class="space-y-2 mt-4 text-left"></div>
                    <button onclick="leaveHousehold()" class="text-rose-500 font-bold text-[10px] uppercase tracking-widest pt-4">Forlat husstand</button>
                </div>
                <button onclick="logout()" class="w-full py-4 text-slate-300 font-bold text-[9px] uppercase tracking-[0.3em]">Logg ut</button>
            </div>
            <div id="sectionAdd" class="tab-content animate-pop">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-4"><h2 id="formTitle" class="text-xl font-black text-indigo-600 italic uppercase">Nytt kjøp</h2></div>
                    <div class="space-y-5">
                        <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl"><button onclick="setBuyer(currentUserFirstName)" id="btnBuyer1" class="flex-1 py-3 rounded-xl text-xs font-black transition-all uppercase">Deg</button><button onclick="setPartnerBuyer()" id="btnBuyer2" class="flex-1 py-3 rounded-xl text-xs font-black text-slate-400 uppercase">Partner</button></div>
                        <input type="text" id="desc" placeholder="Hva er kjøpt?" class="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold text-lg">
                        <input type="number" id="price" placeholder="Pris" class="w-full bg-slate-50 p-4 rounded-2xl font-black text-indigo-600 text-xl outline-none">
                        <select id="category" class="w-full bg-slate-50 p-4 rounded-2xl font-bold text-xs appearance-none outline-none"></select>
                        <button onclick="savePurchase()" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-lg active:scale-95 transition-all">Lagre Kjøpet</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 px-4 pt-2 pb-8 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="switchTab('oversikt')" id="nav-oversikt" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="layout-grid" class="w-6 h-6"></i><span class="text-[7px] font-black uppercase">Oversikt</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('innsikt')" id="nav-innsikt" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="bar-chart-3" class="w-6 h-6"></i><span class="text-[7px] font-black uppercase">Innsikt</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('historikk')" id="nav-historikk" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="archive" class="w-6 h-6"></i><span class="text-[7px] font-black uppercase">Historikk</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('innstillinger')" id="nav-innstillinger" class="flex flex-col items-center gap-0.5 text-slate-300 flex-1"><i data-lucide="settings-2" class="w-6 h-6"></i><span class="text-[7px] font-black uppercase">Instill.</span><div class="nav-dot"></div></button>
                <button onclick="switchTab('add')" id="nav-add" class="bg-slate-900 text-white px-4 py-2 rounded-2xl flex items-center gap-2 shadow-xl active:scale-90 transition-all ml-2"><i data-lucide="plus" class="w-4 h-4"></i><span class="text-[8px] font-black uppercase tracking-tight">Nytt</span></button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc, getDoc, getDocs, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580", authDomain: "mitt-forbruk-79b13.firebaseapp.com", projectId: "mitt-forbruk-79b13", storageBucket: "mitt-forbruk-79b13.firebasestorage.app", messagingSenderId: "383383948424", appId: "1:383383948424:web:dee99653e93b55d977a33d" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app); const provider = new GoogleAuthProvider();
        let currentHid = null, currentUserFirstName = "", allPurchases = [], chart = null, currentBudget = 5000, selectedBuyer = "", partnerName = "Partner";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserFirstName = user.displayName.split(' ')[0];
                const email = user.email.toLowerCase();
                
                if (['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'].includes(email)) {
                    await setDoc(doc(db, "users", user.uid), { hid: "original_familie", name: currentUserFirstName, email: email }, { merge: true });
                    const hhDoc = await getDoc(doc(db, "households", "original_familie"));
                    if (!hhDoc.exists()) await setDoc(doc(db, "households", "original_familie"), { name: "Familien Bulut", owner: user.uid, migrated: false });
                    
                    // START MIGRERING HVIS IKKE UTFØRT
                    if (hhDoc.exists() && hhDoc.data().migrated !== true) {
                        await migrateOldData("original_familie");
                    }
                }

                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().hid) { currentHid = userDoc.data().hid; startApp(); }
                else { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('onboardingScreen').classList.remove('hidden'); }
            }
        });

        async function migrateOldData(hid) {
            console.log("Starter migrering til " + hid);
            const oldPurchasesRef = collection(db, "purchases");
            const snap = await getDocs(oldPurchasesRef);
            if (snap.empty) {
                await updateDoc(doc(db, "households", hid), { migrated: true });
                return;
            }
            const batch = writeBatch(db);
            snap.forEach(oldDoc => {
                const newDocRef = doc(collection(db, "households", hid, "purchases"));
                batch.set(newDocRef, oldDoc.data());
                batch.delete(oldDoc.ref);
            });
            await batch.commit();
            await updateDoc(doc(db, "households", hid), { migrated: true });
            console.log("Migrering fullført!");
            location.reload();
        }

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());
        window.createHousehold = async () => { const newHid = "H-" + Math.random().toString(36).substr(2, 6).toUpperCase(); await setDoc(doc(db, "users", auth.currentUser.uid), { hid: newHid, name: currentUserFirstName, email: auth.currentUser.email }); await setDoc(doc(db, "households", newHid), { name: "Min husstand", migrated: true }); location.reload(); };
        window.joinHousehold = async () => { const code = document.getElementById('joinCodeInput').value.trim().toUpperCase(); if(code) { await setDoc(doc(db, "users", auth.currentUser.uid), { hid: code, name: currentUserFirstName, email: auth.currentUser.email }); location.reload(); } };

        async function startApp() {
            document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('onboardingScreen').classList.add('hidden'); document.getElementById('appContent').classList.remove('hidden');
            document.getElementById('displayHid').innerText = currentHid; document.getElementById('userNameDisplay').innerText = "Hei, " + currentUserFirstName + "!";
            selectedBuyer = currentUserFirstName; const now = new Date(); const monthNames = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];

            onSnapshot(doc(db, "households", currentHid), (d) => { if(d.exists()) { document.getElementById('householdNameDisplay').innerText = d.data().name; document.getElementById('householdNameInput').value = d.data().name; }});
            onSnapshot(query(collection(db, "users"), where("hid", "==", currentHid)), (snap) => {
                const list = document.getElementById('memberList'); list.innerHTML = '';
                snap.forEach(d => { const u = d.data(); list.innerHTML += `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2"><div class="flex flex-col"><span class="font-bold text-xs">${u.name}</span><span class="text-[8px] text-slate-400 uppercase">${u.email}</span></div></div>`; });
            });

            onSnapshot(query(collection(db, "households", currentHid, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = ''; let total = 0, buyerSums = {}, catSums = {}, historyMap = {}; allPurchases = [];
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt); const sortKey = `${date.getFullYear()}-${date.getMonth()}`;
                    allPurchases.push({ ...p, id, date }); if(!historyMap[sortKey]) historyMap[sortKey] = { label: `${monthNames[date.getMonth()]} ${date.getFullYear()}`, sum: 0 }; historyMap[sortKey].sum += p.price;
                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price; buyerSums[p.buyer] = (buyerSums[p.buyer] || 0) + p.price; catSums[p.category] = (catSums[p.category] || 0) + p.price;
                        const card = document.createElement('div'); card.className = "bg-white p-5 rounded-[1.8rem] border border-slate-50 flex flex-col gap-3 shadow-sm animate-pop";
                        card.innerHTML = `<div class="flex justify-between items-start"><h3 class="font-black text-slate-900 text-xs uppercase">${p.desc}</h3><p class="font-black text-lg text-slate-900">${p.price.toLocaleString()} kr</p></div><div class="flex flex-wrap gap-2"><span class="text-[7px] font-black px-2 py-1 rounded-lg bg-slate-100 text-slate-500 uppercase">${p.category}</span><span class="text-[7px] font-black px-2 py-1 rounded-lg ${p.buyer===currentUserFirstName?'bg-indigo-50 text-indigo-600':'bg-rose-50 text-rose-500'} uppercase">${p.buyer}</span></div>`;
                        list.appendChild(card);
                    }
                });
                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const buyers = Object.keys(buyerSums); if(buyers.length >= 2) partnerName = buyers.find(b => b !== currentUserFirstName);
                updateChart(catSums); updateHistory(historyMap);
            });

            onSnapshot(query(collection(db, "households", currentHid, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '<option value="Mat">Mat</option><option value="Transport">Transport</option><option value="Shopping">Shopping</option><option value="Bolig">Bolig</option><option value="Annet">Annet</option>';
                snap.forEach(d => { sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`; });
            });
        }

        window.updateHouseholdName = async () => { await updateDoc(doc(db, "households", currentHid), { name: document.getElementById('householdNameInput').value }); alert("Lagret!"); };
        window.savePurchase = async () => { const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value); if(!d || isNaN(p)) return alert("Mangler data!"); await addDoc(collection(db, "households", currentHid, "purchases"), { desc: d, price: p, category: document.getElementById('category').value, buyer: selectedBuyer, createdAt: Date.now() }); document.getElementById('desc').value = ''; document.getElementById('price').value = ''; switchTab('oversikt'); };
        window.switchTab = (t) => { document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active')); document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active'); document.getElementById('nav-' + t).classList.add('nav-active'); if(t !== 'add') document.getElementById('pageTitleDisplay').innerText = t.charAt(0).toUpperCase() + t.slice(1); window.scrollTo(0,0); };
        window.setBuyer = (b) => { selectedBuyer = b; document.getElementById('btnBuyer1').className = b === currentUserFirstName ? "flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-lg uppercase" : "flex-1 py-3 rounded-xl text-xs font-black text-slate-400 uppercase"; document.getElementById('btnBuyer2').className = b !== currentUserFirstName ? "flex-1 py-3 rounded-xl text-xs font-black bg-rose-400 text-white shadow-lg uppercase" : "flex-1 py-3 rounded-xl text-xs font-black text-slate-400 uppercase"; };
        window.setPartnerBuyer = () => { if(partnerName) setBuyer(partnerName); };
        function updateChart(catSums) { const ctx = document.getElementById('categoryChart'); if(chart) chart.destroy(); const labels = Object.keys(catSums), data = Object.values(catSums); if(labels.length === 0) return; chart = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: ['#6366f1', '#fbbf24', '#10b981', '#f43f5e', '#8b5cf6'], borderWidth: 0 }] }, options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } } } }); }
        function updateHistory(historyMap) { const histList = document.getElementById('historyList'); histList.innerHTML = ''; Object.keys(historyMap).sort().reverse().forEach(key => { const h = historyMap[key]; histList.innerHTML += `<div class="bg-white p-5 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm mb-2"><div class="flex flex-col"><span class="font-black text-slate-900 uppercase text-[9px] tracking-widest">${h.label}</span></div><span class="font-black text-slate-900 text-lg tracking-tighter">${h.sum.toLocaleString()} kr</span></div>`; }); }
        lucide.createIcons(); switchTab('oversikt');
    </script>
</body>
</html>
