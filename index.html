<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #e2e8f0; cursor: pointer; font-size: 1.8rem; padding: 0 0.1rem; transition: 0.2s; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .battle-bar-k { transition: width 1s cubic-bezier(0.65, 0, 0.35, 1); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#4F46E5] flex items-center justify-center p-8 text-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-pop">
            <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                <i data-lucide="sparkles" class="w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-extrabold mb-2 tracking-tight">Vårt Forbruk</h2>
            <p class="text-slate-400 text-sm mb-12 font-medium">Versjon 9.0 • Fresh Edition</p>
            <button onclick="login()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl">
                Logg inn med Google
            </button>
        </div>
    </div>

    <div id="appContent" class="hidden flex flex-col min-h-screen">
        
        <header class="bg-white px-6 pt-14 pb-8 border-b border-slate-100 sticky top-0 z-40">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="userNameDisplay" class="text-2xl font-extrabold tracking-tight text-slate-900">Hei, ...</h2>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1" id="headerDate">APRIL 2026</p>
                </div>
                <div class="flex gap-2">
                    <span class="text-[9px] bg-indigo-50 text-indigo-500 font-extrabold px-3 py-1.5 rounded-full uppercase tracking-tighter">v9.0 Pro</span>
                </div>
            </div>
            
            <div class="bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl shadow-indigo-100 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>
                <div class="relative z-10">
                    <p class="text-indigo-300 text-[10px] font-black uppercase tracking-widest mb-1">Totalt forbruk</p>
                    <div class="flex justify-between items-end">
                        <span class="text-4xl font-extrabold text-white tracking-tighter" id="totalMonth">0 kr</span>
                        <span class="text-indigo-300 text-xs font-bold" id="budgetLabel">av --</span>
                    </div>
                    <div class="w-full h-2.5 bg-white/10 rounded-full mt-5 overflow-hidden">
                        <div id="budgetBar" class="h-full bg-indigo-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 p-6 max-w-md mx-auto w-full pb-32">
            
            <div id="sectionFeed" class="space-y-5 animate-pop">
                <div class="flex justify-between items-center px-1">
                    <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest">Siste kjøp</h3>
                    <i data-lucide="sliders-horizontal" class="w-4 h-4 text-slate-300"></i>
                </div>
                <div id="purchasesList" class="space-y-4"></div>
            </div>

            <div id="sectionStats" class="hidden space-y-6 animate-pop">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 relative">
                    <h3 class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Kategorifordeling</h3>
                    <div class="relative">
                        <canvas id="typeChart" class="max-h-56 mx-auto"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Hvem har brukt mest?</h3>
                    <div class="flex justify-between text-[10px] font-black mb-2 px-1">
                        <span class="text-indigo-600">KUTLU</span>
                        <span class="text-rose-500">HULYA</span>
                    </div>
                    <div class="w-full h-6 bg-slate-100 rounded-full overflow-hidden flex">
                        <div id="battleK" class="h-full bg-indigo-500 battle-bar-k" style="width: 50%"></div>
                        <div id="battleH" class="h-full bg-rose-400 flex-1" style="width: 50%"></div>
                    </div>
                    <div class="flex justify-between mt-3 px-1">
                        <span id="statKSum" class="font-extrabold text-slate-800 text-sm">0 kr</span>
                        <span id="statHSum" class="font-extrabold text-slate-800 text-sm">0 kr</span>
                    </div>
                </div>

                <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white text-center shadow-xl shadow-indigo-100">
                    <p class="text-indigo-200 text-[10px] font-black uppercase tracking-widest mb-1">Daglig snittforbruk</p>
                    <p id="dailyAvg" class="text-4xl font-extrabold tracking-tighter">0 kr</p>
                </div>
            </div>

            <div id="sectionAdd" class="hidden animate-pop">
                <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-50 space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 id="formTitle" class="text-2xl font-extrabold tracking-tight">Nytt kjøp</h2>
                        <button onclick="cancelEdit()" id="btnCancel" class="hidden bg-rose-50 text-rose-500 px-4 py-2 rounded-full text-[10px] font-extrabold uppercase">Avbryt</button>
                    </div>
                    <input type="hidden" id="editId">
                    
                    <div class="space-y-4">
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Beskrivelse</label>
                            <input type="text" id="desc" placeholder="Hva kjøpte du?" class="w-full bg-transparent p-1 outline-none font-bold text-lg">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-4 rounded-2xl">
                                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Pris</label>
                                <input type="number" id="price" placeholder="0" class="w-full bg-transparent p-1 outline-none font-extrabold text-xl text-indigo-600">
                            </div>
                            <div class="bg-slate-50 p-4 rounded-2xl">
                                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Kategori</label>
                                <select id="category" class="w-full bg-transparent p-1 outline-none font-bold text-sm text-slate-600 h-8"></select>
                            </div>
                        </div>

                        <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                            <button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-4 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase">Behov</button>
                            <button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-4 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase">Lyst</button>
                        </div>

                        <div class="bg-slate-50 p-6 rounded-3xl text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-3 tracking-widest">Glede & Verdi</p>
                            <div class="star-rating">
                                <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                                <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                                <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                                <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                                <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                            </div>
                        </div>

                        <button onclick="savePurchase()" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-widest">Lagre Kjøp</button>
                    </div>
                </div>
            </div>

            <div id="sectionAdmin" class="hidden space-y-6 animate-pop">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-8">
                    <div>
                        <h4 class="text-xs font-black uppercase text-indigo-600 mb-4 tracking-tighter">Månedsbudsjett</h4>
                        <div class="flex gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-100 focus-within:ring-2 ring-indigo-500/20 transition-all">
                            <input type="number" id="budgetInput" class="flex-1 bg-transparent p-3 outline-none font-black text-xl">
                            <button onclick="updateBudget()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-indigo-100">Lagre</button>
                        </div>
                    </div>

                    <div class="pt-2">
                        <h4 class="text-xs font-black uppercase text-indigo-600 mb-4 tracking-tighter">Dine Kategorier</h4>
                        <div id="customCatsList" class="flex flex-wrap gap-2 mb-6"></div>
                        <button onclick="addCategoryPrompt()" class="w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-black uppercase hover:border-indigo-300 hover:text-indigo-400 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> Ny kategori
                        </button>
                    </div>

                    <div class="pt-4">
                        <button onclick="logout()" class="w-full p-5 bg-rose-50 text-rose-500 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center justify-center gap-2">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Logg ut
                        </button>
                    </div>
                </div>
            </div>

        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 px-8 pt-4 pb-10 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="switchTab('feed')" id="nav-feed" class="flex flex-col items-center gap-1.5 text-indigo-600 transition-all">
                    <i data-lucide="layout-list" class="w-6 h-6"></i>
                    <span class="text-[8px] font-black uppercase tracking-tighter">Logg</span>
                </button>
                <button onclick="switchTab('stats')" id="nav-stats" class="flex flex-col items-center gap-1.5 text-slate-300 transition-all">
                    <i data-lucide="bar-chart-3" class="w-6 h-6"></i>
                    <span class="text-[8px] font-black uppercase tracking-tighter">Innsikt</span>
                </button>
                <button onclick="switchTab('add')" id="nav-add" class="bg-slate-900 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-2xl shadow-slate-300 -translate-y-6 active:scale-90 transition-all">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
                <button onclick="switchTab('admin')" id="nav-admin" class="flex flex-col items-center gap-1.5 text-slate-300 transition-all">
                    <i data-lucide="user" class="w-6 h-6"></i>
                    <span class="text-[8px] font-black uppercase tracking-tighter">Profil</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'];
        const FIXED_CATS = ['🛒 Mat', '🏠 Bolig', '🚗 Transport', '🛍️ Shopping', '✨ Annet'];
        let currentBudget = 5000, selectedType = 'Behov', chart = null;

        setPersistence(auth, browserLocalPersistence);

        window.login = () => signInWithPopup(auth, provider).catch(e => alert("Innlogging feilet. Sjekk Safari-innstillinger."));
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Hei, " + user.displayName.split(' ')[0] + "!";
                startApp();
            }
        });

        async function startApp() {
            const now = new Date();
            document.getElementById('headerDate').innerText = now.toLocaleString('no-NO', { month: 'long', year: 'numeric' }).toUpperCase();

            onSnapshot(doc(db, "settings", "global"), (d) => {
                if(d.exists()) {
                    currentBudget = d.data().monthlyBudget;
                    document.getElementById('budgetInput').value = currentBudget;
                    document.getElementById('budgetLabel').innerText = "av " + Math.round(currentBudget/1000) + "k";
                }
            });

            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '';
                const adminList = document.getElementById('customCatsList'); adminList.innerHTML = '';
                FIXED_CATS.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                snap.forEach(d => {
                    const name = d.data().name;
                    if(!FIXED_CATS.includes(name)) {
                        sel.innerHTML += `<option value="${name}">${name}</option>`;
                        adminList.innerHTML += `<span class="bg-white border border-slate-100 text-slate-600 px-4 py-2 rounded-2xl text-[10px] font-extrabold uppercase flex items-center gap-2 shadow-sm">${name} <i onclick="deleteCategory('${d.id}')" data-lucide="x" class="w-3 h-3 text-rose-400 cursor-pointer"></i></span>`;
                    }
                });
                lucide.createIcons();
            });

            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                let total = 0, nSum = 0, wSum = 0, kSum = 0, hSum = 0;
                
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt);
                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price;
                        if(p.type === 'Behov') nSum += p.price; else wSum += p.price;
                        if(p.buyer.toLowerCase().includes('kutlu') || p.buyer.toLowerCase().includes('bulut')) kSum += p.price; else hSum += p.price;
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] border border-slate-50 flex justify-between items-center shadow-sm animate-pop";
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1.5">
                                <span class="text-[7px] font-black px-2 py-0.5 rounded-full ${p.type === 'Behov' ? 'bg-indigo-50 text-indigo-600' : 'bg-amber-50 text-amber-600'} uppercase tracking-widest">${p.type}</span>
                                <span class="text-[8px] font-extrabold text-slate-300 uppercase">${date.toLocaleDateString('no-NO', {day:'2-digit', month:'short'})}</span>
                            </div>
                            <h3 class="font-bold text-slate-800 text-sm tracking-tight">${p.desc}</h3>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mt-0.5">${p.category} • ${p.buyer.split(' ')[0]}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-extrabold text-[16px] text-slate-900">${p.price.toLocaleString()} kr</p>
                            <div class="flex gap-3 justify-end mt-2">
                                <button onclick="editMode('${id}', '${p.desc}', ${p.price}, '${p.category}', '${p.type}', ${p.myRating})" class="bg-slate-50 p-2 rounded-full text-slate-300 hover:text-indigo-600 transition-all"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                                <button onclick="deletePurchase('${id}')" class="bg-slate-50 p-2 rounded-full text-slate-300 hover:text-rose-500 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>`;
                    list.appendChild(card);
                });

                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                document.getElementById('budgetBar').style.backgroundColor = pcent > 90 ? '#FB7185' : '#818CF8';
                
                document.getElementById('dailyAvg').innerText = Math.round(total / now.getDate()) + " kr";
                document.getElementById('statKSum').innerText = kSum.toLocaleString() + " kr";
                document.getElementById('statHSum').innerText = hSum.toLocaleString() + " kr";
                
                const ratio = total > 0 ? (kSum / total) * 100 : 50;
                document.getElementById('battleK').style.width = ratio + "%";
                
                updateChart(nSum, wSum);
                lucide.createIcons();
            });
        }

        window.updateBudget = async () => {
            const v = parseFloat(document.getElementById('budgetInput').value);
            if(v > 0) {
                await setDoc(doc(db, "settings", "global"), { monthlyBudget: v });
                alert("Budsjett oppdatert!");
            }
        };

        window.addCategoryPrompt = async () => {
            const n = prompt("Navn på ny kategori:");
            if(n) await addDoc(collection(db, "categories"), { name: n.trim() });
        };

        window.deleteCategory = async (id) => { if(confirm("Slette kategori?")) await deleteDoc(doc(db, "categories", id)); };

        window.savePurchase = async () => {
            const id = document.getElementById('editId').value;
            const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            const r = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
            if(!d || isNaN(p) || r === 0) return alert("Fyll ut alt!");
            
            const data = { desc: d, price: p, category: document.getElementById('category').value, type: selectedType, myRating: r, buyer: auth.currentUser.displayName, createdAt: Date.now() };
            if(id) await updateDoc(doc(db, "purchases", id), data);
            else await addDoc(collection(db, "purchases"), data);
            
            cancelEdit(); switchTab('feed');
        };

        window.editMode = (id, desc, price, cat, type, rate) => {
            switchTab('add');
            document.getElementById('editId').value = id;
            document.getElementById('desc').value = desc;
            document.getElementById('price').value = price;
            document.getElementById('category').value = cat;
            window.setType(type);
            document.getElementById(`star${rate}`).checked = true;
            document.getElementById('formTitle').innerText = "Endre kjøp";
            document.getElementById('btnSave').innerText = "Oppdater";
            document.getElementById('btnCancel').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('price').value = '';
            document.getElementById('formTitle').innerText = "Nytt kjøp";
            document.getElementById('btnSave').innerText = "Lagre Kjøp";
            document.getElementById('btnCancel').classList.add('hidden');
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
        };

        window.setType = (t) => {
            selectedType = t;
            document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-4 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-4 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase";
            document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-4 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-4 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase";
        };

        window.switchTab = (t) => {
            ['sectionFeed', 'sectionStats', 'sectionAdd', 'sectionAdmin'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
            
            ['nav-feed', 'nav-stats', 'nav-admin'].forEach(n => document.getElementById(n).className = "flex flex-col items-center gap-1.5 text-slate-300");
            if(t !== 'add') document.getElementById('nav-' + t).className = "flex flex-col items-center gap-1.5 text-indigo-600 font-extrabold";
            window.scrollTo(0,0);
        };

        window.deletePurchase = async (id) => { if(confirm("Slette permanent?")) await deleteDoc(doc(db, "purchases", id)); };

        function updateChart(n, w) {
            const ctx = document.getElementById('typeChart'); if(chart) chart.destroy();
            chart = new Chart(ctx, { 
                type: 'doughnut', 
                data: { labels: ['Behov', 'Lyst'], datasets: [{ data: [n, w], backgroundColor: ['#818CF8', '#FBBF24'], borderWidth: 0, hoverOffset: 4 }] },
                options: { cutout: '82%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 20, font: { family: 'Plus Jakarta Sans', size: 10, weight: '800' } } } } }
            });
        }
        lucide.createIcons();
    </script>
</body>
</html>
