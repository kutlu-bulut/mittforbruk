<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vårt Forbruk v8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #d1d5db; cursor: pointer; font-size: 1.5rem; padding: 0 0.1rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { 0% { transform: scale(0.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .tab-btn.active { @apply bg-white text-indigo-600 shadow-sm; }
        .safe-area-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-pop relative">
            <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                <i data-lucide="layout-dashboard" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 italic">Vårt Forbruk</h2>
            <p class="text-slate-400 text-xs mb-10 font-medium tracking-wide uppercase">Household Finance Manager</p>
            
            <button onclick="login()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-bold flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg">
                <i data-lucide="log-in" class="w-5 h-5"></i> Logg inn
            </button>

            <div id="statusMsg" class="mt-6 text-[10px] font-bold text-slate-300 uppercase tracking-widest">v8.0 Ready</div>
        </div>
    </div>

    <div id="appContent" class="hidden flex flex-col min-h-screen">
        
        <header class="bg-white px-6 pt-12 pb-8 sticky top-0 z-40 border-b border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 id="userNameDisplay" class="text-xl font-black text-indigo-600 italic">Hei!</h2>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest" id="headerMonth">April 2026</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] bg-slate-100 text-slate-400 font-mono px-2 py-1 rounded-full border border-slate-200 uppercase">v8.0</span>
                </div>
            </div>
            
            <div class="space-y-3 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                <div class="flex justify-between items-end">
                    <span class="text-3xl font-black tracking-tighter" id="totalMonth">0 kr</span>
                    <span class="text-slate-400 text-[10px] font-bold uppercase tracking-tighter" id="budgetLabel">Budsjett: --</span>
                </div>
                <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="budgetBar" class="h-full bg-indigo-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <main class="flex-1 p-5 max-w-md mx-auto w-full pb-32">
            
            <div id="sectionFeed" class="space-y-4 animate-pop">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Siste bevegelser</h3>
                <div id="purchasesList" class="space-y-3"></div>
            </div>

            <div id="sectionStats" class="hidden space-y-6 animate-pop">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Forbruksanalyse</h3>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <canvas id="typeChart" class="max-h-56 mx-auto"></canvas>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 text-center shadow-sm">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Daglig snitt</p>
                        <p id="dailyAvg" class="text-xl font-black text-indigo-600">0 kr</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 text-center shadow-sm">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Duell (K/H)</p>
                        <p id="userSplit" class="text-xs font-black text-slate-700 mt-1">0 / 0</p>
                    </div>
                </div>
            </div>

            <div id="sectionAdd" class="hidden animate-pop">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100 space-y-5">
                    <div class="flex justify-between items-center mb-2">
                        <h2 id="formTitle" class="text-xl font-black italic text-indigo-600">Registrer kjøp</h2>
                        <button onclick="cancelEdit()" id="btnCancel" class="hidden text-red-500 font-bold text-[10px] uppercase">Avbryt</button>
                    </div>
                    <input type="hidden" id="editId">
                    
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-3">Hva har du kjøpt?</label>
                        <input type="text" id="desc" placeholder="Butikk, vare, etc." class="w-full p-5 bg-slate-50 rounded-[1.5rem] outline-none font-bold focus:ring-2 ring-indigo-500/10">
                    </div>

                    <div class="flex gap-3">
                        <div class="flex-1 space-y-1">
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-3">Pris (kr)</label>
                            <input type="number" id="price" placeholder="0" class="w-full p-5 bg-slate-50 rounded-[1.5rem] outline-none font-black text-indigo-600 text-xl">
                        </div>
                        <div class="flex-1 space-y-1">
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-3">Kategori</label>
                            <div class="relative">
                                <select id="category" class="w-full p-5 bg-slate-50 rounded-[1.5rem] outline-none font-bold text-xs text-slate-500 h-[68px]"></select>
                            </div>
                        </div>
                    </div>

                    <div class="flex bg-slate-100 p-1.5 rounded-[1.5rem]">
                        <button onclick="setType('Behov')" id="btnBehov" class="flex-1 py-3.5 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase">Behov</button>
                        <button onclick="setType('Lyst')" id="btnLyst" class="flex-1 py-3.5 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase">Lyst</button>
                    </div>

                    <div class="text-center py-5 bg-slate-50 rounded-[2rem]">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Hvor mye glede ga dette?</p>
                        <div class="star-rating">
                            <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                            <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                            <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                            <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                            <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                        </div>
                    </div>

                    <button onclick="savePurchase()" id="btnSave" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-lg active:scale-95 transition-all uppercase tracking-widest">Lagre</button>
                </div>
            </div>

            <div id="sectionAdmin" class="hidden space-y-6 animate-pop">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Konfigurasjon</h3>
                
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                    <div>
                        <h4 class="text-xs font-black uppercase text-indigo-600 mb-4">Månedsbudsjett</h4>
                        <div class="flex gap-3">
                            <input type="number" id="budgetInput" class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none font-black text-lg">
                            <button onclick="updateBudget()" class="bg-indigo-600 text-white px-6 rounded-2xl font-black text-xs uppercase">Lagre</button>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <h4 class="text-xs font-black uppercase text-indigo-600 mb-4">Egendefinerte Kategorier</h4>
                        <div id="customCatsList" class="flex flex-wrap gap-2 mb-4"></div>
                        <button onclick="addCategoryPrompt()" class="w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-bold uppercase hover:border-indigo-300 hover:text-indigo-400 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> Ny kategori
                        </button>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <button onclick="logout()" class="w-full p-5 bg-red-50 text-red-500 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Logg ut
                        </button>
                    </div>
                </div>
            </div>

        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 px-6 pt-3 pb-8 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <button onclick="switchTab('feed')" id="nav-feed" class="flex flex-col items-center gap-1 text-indigo-600">
                    <i data-lucide="list" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase">Logg</span>
                </button>
                <button onclick="switchTab('stats')" id="nav-stats" class="flex flex-col items-center gap-1 text-slate-300">
                    <i data-lucide="pie-chart" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase">Stats</span>
                </button>
                <button onclick="switchTab('add')" id="nav-add" class="flex flex-col items-center gap-1 text-slate-300 scale-125 -translate-y-2 bg-indigo-600 p-3 rounded-2xl text-white shadow-indigo-200 shadow-xl">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
                <button onclick="switchTab('admin')" id="nav-admin" class="flex flex-col items-center gap-1 text-slate-300">
                    <i data-lucide="settings-2" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase">Admin</span>
                </button>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com', 'ertaselli@gmail.com'];
        const FIXED_CATS = ['🛒 Mat', '🏠 Bolig', '🚗 Transport', '🛍️ Shopping', '✨ Annet'];
        let currentBudget = 15000, selectedType = 'Behov', chart = null;

        setPersistence(auth, browserLocalPersistence);

        window.login = () => {
            signInWithPopup(auth, provider).catch(e => alert("Safari blokkerer popup? Prøv å trykke Tillat."));
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Hei, " + user.displayName.split(' ')[0] + "!";
                startApp();
            }
        });

        async function startApp() {
            // Header Month
            const now = new Date();
            document.getElementById('headerMonth').innerText = now.toLocaleString('no-NO', { month: 'long', year: 'numeric' });

            // Budget Snapshot
            onSnapshot(doc(db, "settings", "global"), (d) => {
                if(d.exists()) {
                    currentBudget = d.data().monthlyBudget;
                    document.getElementById('budgetInput').value = currentBudget;
                    document.getElementById('budgetLabel').innerText = "Budsjett: " + Math.round(currentBudget/1000) + "k";
                }
            });

            // Categories Snapshot
            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                const sel = document.getElementById('category'); sel.innerHTML = '';
                const adminList = document.getElementById('customCatsList'); adminList.innerHTML = '';
                
                FIXED_CATS.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
                snap.forEach(d => {
                    const name = d.data().name;
                    if(!FIXED_CATS.includes(name)) {
                        sel.innerHTML += `<option value="${name}">${name}</option>`;
                        adminList.innerHTML += `<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center gap-2">${name} <i onclick="deleteCategory('${d.id}')" data-lucide="x" class="w-3 h-3 cursor-pointer"></i></span>`;
                    }
                });
                lucide.createIcons();
            });

            // Purchases Snapshot
            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList'); list.innerHTML = '';
                let total = 0, nSum = 0, wSum = 0, kSum = 0, hSum = 0;
                
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id; const date = new Date(p.createdAt);
                    if(date.getMonth() === now.getMonth()) {
                        total += p.price;
                        if(p.type === 'Behov') nSum += p.price; else wSum += p.price;
                        if(p.buyer.toLowerCase().includes('kutlu') || p.buyer.toLowerCase().includes('bulut')) kSum += p.price; else hSum += p.price;
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex justify-between items-center animate-pop";
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[8px] font-black px-2 py-0.5 rounded-full ${p.type === 'Behov' ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'} uppercase">${p.type}</span>
                                <span class="text-[8px] font-bold text-slate-300 uppercase">${date.toLocaleDateString('no-NO', {day:'2-digit', month:'short'})}</span>
                            </div>
                            <h3 class="font-black text-slate-800 text-sm uppercase">${p.desc}</h3>
                            <p class="text-[9px] font-bold text-slate-300 uppercase">${p.category} • ${p.buyer.split(' ')[0]}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-lg text-slate-800">${p.price.toLocaleString()} kr</p>
                            <div class="flex gap-4 justify-end mt-1">
                                <button onclick="editMode('${id}', '${p.desc}', ${p.price}, '${p.category}', '${p.type}', ${p.myRating})" class="text-slate-200 hover:text-indigo-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deletePurchase('${id}')" class="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>`;
                    list.appendChild(card);
                });

                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                const pcent = Math.min((total / currentBudget) * 100, 100);
                document.getElementById('budgetBar').style.width = pcent + "%";
                document.getElementById('budgetBar').className = `h-full transition-all duration-1000 ${pcent > 90 ? 'bg-red-500' : 'bg-indigo-500'}`;
                
                document.getElementById('dailyAvg').innerText = Math.round(total / now.getDate()) + " kr";
                document.getElementById('userSplit').innerText = `K: ${Math.round(kSum/1000)}k / H: ${Math.round(hSum/1000)}k`;
                
                updateChart(nSum, wSum);
                lucide.createIcons();
            });
        }

        window.updateBudget = async () => {
            const v = parseFloat(document.getElementById('budgetInput').value);
            if(v > 0) await setDoc(doc(db, "settings", "global"), { monthlyBudget: v });
            alert("Budsjett oppdatert!");
        };

        window.addCategoryPrompt = async () => {
            const n = prompt("Navn på ny kategori:");
            if(n) await addDoc(collection(db, "categories"), { name: n.trim() });
        };

        window.deleteCategory = async (id) => { if(confirm("Slette kategori?")) await deleteDoc(doc(db, "categories", id)); };

        window.savePurchase = async () => {
            const id = document.getElementById('editId').value;
            const d = document.getElementById('desc').value, p = parseFloat(document.getElementById('price').value);
            const r = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);
            if(!d || isNaN(p) || r === 0) return alert("Fyll ut alt!");
            
            const data = { desc: d, price: p, category: document.getElementById('category').value, type: selectedType, myRating: r, buyer: auth.currentUser.displayName, createdAt: Date.now() };
            if(id) await updateDoc(doc(db, "purchases", id), data);
            else await addDoc(collection(db, "purchases"), data);
            
            cancelEdit(); switchTab('feed');
        };

        window.editMode = (id, desc, price, cat, type, rate) => {
            switchTab('add');
            document.getElementById('editId').value = id;
            document.getElementById('desc').value = desc;
            document.getElementById('price').value = price;
            document.getElementById('category').value = cat;
            window.setType(type);
            document.getElementById(`star${rate}`).checked = true;
            document.getElementById('formTitle').innerText = "Endre kjøp";
            document.getElementById('btnCancel').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('price').value = '';
            document.getElementById('formTitle').innerText = "Registrer kjøp";
            document.getElementById('btnCancel').classList.add('hidden');
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
        };

        window.setType = (t) => {
            selectedType = t;
            document.getElementById('btnBehov').className = t === 'Behov' ? "flex-1 py-3.5 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3.5 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase";
            document.getElementById('btnLyst').className = t === 'Lyst' ? "flex-1 py-3.5 rounded-xl text-[10px] font-black bg-white shadow-sm transition-all uppercase" : "flex-1 py-3.5 rounded-xl text-[10px] font-black text-slate-400 transition-all uppercase";
        };

        window.switchTab = (t) => {
            ['sectionFeed', 'sectionStats', 'sectionAdd', 'sectionAdmin'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
            
            ['nav-feed', 'nav-stats', 'nav-admin'].forEach(n => document.getElementById(n).className = "flex flex-col items-center gap-1 text-slate-300");
            if(t !== 'add') document.getElementById('nav-' + t).className = "flex flex-col items-center gap-1 text-indigo-600";
            window.scrollTo(0,0);
        };

        window.deletePurchase = async (id) => { if(confirm("Slette permanent?")) await deleteDoc(doc(db, "purchases", id)); };

        function updateChart(n, w) {
            const ctx = document.getElementById('typeChart'); if(chart) chart.destroy();
            chart = new Chart(ctx, { 
                type: 'doughnut', 
                data: { labels: ['Behov', 'Lyst'], datasets: [{ data: [n, w], backgroundColor: ['#6366f1', '#fbbf24'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } } } } }
            });
        }
        lucide.createIcons();
    </script>
</body>
</html>
