<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vårt Forbruk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #d1d5db; cursor: pointer; font-size: 2.2rem; }
        .star-rating input:checked ~ label { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center animate-pop">
            <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Velkommen</h2>
            <p class="text-slate-400 text-sm mb-8 font-medium">Logg inn med Google for å se deres forbruk</p>
            
            <button onclick="login()" class="w-full bg-white border-2 border-slate-100 text-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 transition-all shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5">
                Logg inn med Google
            </button>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-[#4f46e5] text-white p-6 pb-10 rounded-b-[2.5rem] shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black tracking-tighter italic">MITT FORBRUK</h1>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 p-4 rounded-3xl border border-white/10">
                    <p id="totalMonth" class="text-2xl font-black">0 kr</p>
                </div>
                <div class="bg-white/10 p-4 rounded-3xl border border-white/10 text-right">
                    <p id="avgScore" class="text-2xl font-black">0.0</p>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-6 max-w-md mx-auto">
            <div class="flex p-1.5 bg-white/80 rounded-[1.5rem] shadow-xl border border-white mb-6">
                <button onclick="switchTab('feed')" id="tabFeed" class="flex-1 py-3.5 rounded-[1.2rem] text-sm font-black bg-indigo-600 text-white shadow-md">Oversikt</button>
                <button onclick="switchTab('add')" id="tabAdd" class="flex-1 py-3.5 rounded-[1.2rem] text-sm font-black text-slate-400">Registrer</button>
            </div>
            <div id="sectionFeed" class="space-y-4 pb-28">
                <div id="purchasesList" class="space-y-4"></div>
            </div>
            <div id="sectionAdd" class="hidden">
                <div class="bg-white p-7 rounded-[2.5rem] shadow-2xl border border-slate-100">
                    <div class="space-y-5">
                        <input type="text" id="desc" placeholder="Hva er kjøpt?" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-semibold">
                        <input type="number" id="price" placeholder="Pris (Kr)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-black text-lg text-indigo-600">
                        <div class="text-center py-4 bg-slate-50 rounded-3xl">
                            <div class="star-rating">
                                <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                                <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                                <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                                <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                                <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                            </div>
                        </div>
                        <button onclick="savePurchase()" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest">Lagre</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- VIKTIG: LEGG INN GODKJENTE E-POSTER HER ---
        const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com'];

        window.login = () => {
            signInWithPopup(auth, provider).catch(error => alert("Feil ved innlogging: " + error.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email)) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                startApp(user.displayName);
            } else if (user) {
                alert("Du har ikke tilgang til denne appen.");
                signOut(auth);
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appContent').classList.add('hidden');
            }
        });

        function startApp(userName) {
            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList');
                list.innerHTML = '';
                let total = 0, rSum = 0, count = 0;
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id;
                    total += p.price; rSum += p.myRating; count++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50 animate-pop";
                    
                    let partnerAction = '';
                    if(p.buyer !== userName && p.partnerRating === 0) {
                        partnerAction = `<div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between">
                            <span class="text-[9px] font-black text-indigo-400 uppercase italic">Vurder denne:</span>
                            <div class="flex gap-1.5">${[1,2,3,4,5].map(i => `<button onclick="ratePartner('${id}', ${i})" class="w-8 h-8 bg-slate-50 rounded-xl text-[10px] font-black">★${i}</button>`).join('')}</div>
                        </div>`;
                    } else if(p.partnerRating > 0) {
                        partnerAction = `<div class="mt-4 pt-3 border-t border-slate-50 text-[9px] font-black text-slate-300 uppercase italic font-bold tracking-widest">Partner: ${"★".repeat(p.partnerRating)}</div>`;
                    }

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div onclick="deletePurchase('${id}')">
                                <h3 class="font-black text-slate-800 text-md leading-tight uppercase">${p.desc}</h3>
                                <p class="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-wider">${p.buyer}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-indigo-600 text-lg">${p.price.toLocaleString()} kr</p>
                                <div class="text-amber-400 text-xs">${"★".repeat(p.myRating)}</div>
                            </div>
                        </div>
                        ${partnerAction}
                    `;
                    list.appendChild(card);
                });
                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                document.getElementById('avgScore').innerText = count > 0 ? (rSum/count).toFixed(1) : "0.0";
                lucide.createIcons();
            });
        }

        window.switchTab = (tab) => {
            const isFeed = tab === 'feed';
            document.getElementById('sectionFeed').classList.toggle('hidden', !isFeed);
            document.getElementById('sectionAdd').classList.toggle('hidden', isFeed);
            document.getElementById('tabFeed').className = isFeed ? "flex-1 py-3.5 rounded-[1.2rem] text-sm font-black bg-indigo-600 text-white shadow-md" : "flex-1 py-3.5 rounded-[1.2rem] text-sm font-black text-slate-400";
            document.getElementById('tabAdd').className = !isFeed ? "flex-1 py-3.5 rounded-[1.2rem] text-sm font-black bg-indigo-600 text-white shadow-md" : "flex-1 py-3.5 rounded-[1.2rem] text-sm font-black text-slate-400";
        };

        window.savePurchase = async () => {
            const desc = document.getElementById('desc').value;
            const price = document.getElementById('price').value;
            const rating = document.querySelector('input[name="rating"]:checked')?.value || 0;
            if(!desc || !price || rating === 0) return alert("Fyll ut alt!");
            await addDoc(collection(db, "purchases"), {
                desc, price: parseFloat(price), myRating: parseInt(rating),
                partnerRating: 0, buyer: auth.currentUser.displayName, createdAt: Date.now()
            });
            document.getElementById('desc').value = '';
            document.getElementById('price').value = '';
            switchTab('feed');
        };

        window.ratePartner = async (id, val) => { await updateDoc(doc(db, "purchases", id), { partnerRating: val }); };
        window.deletePurchase = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "purchases", id)); };
        lucide.createIcons();
    </script>
</body>
</html>
