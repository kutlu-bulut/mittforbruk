<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vårt Forbruk v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #d1d5db; cursor: pointer; font-size: 1.8rem; padding: 0 0.1rem; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .active-tab { bg-indigo-600; text-white; shadow-lg; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-8">Velkommen</h2>
            <button onclick="login()" class="w-full bg-white border-2 border-slate-100 text-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5">
                Logg inn med Google
            </button>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header class="bg-indigo-600 text-white p-6 rounded-b-[2rem] shadow-xl sticky top-0 z-50">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest">Logget inn som</p>
                    <h2 id="userNameDisplay" class="text-xl font-black italic">Laster...</h2>
                </div>
                <button onclick="logout()" class="bg-white/10 p-2 rounded-xl"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-white/10 p-3 rounded-2xl border border-white/10">
                    <p class="text-[10px] uppercase font-bold text-indigo-200">Denne måneden</p>
                    <p id="totalMonth" class="text-xl font-black">0 kr</p>
                </div>
                <div class="bg-white/10 p-3 rounded-2xl border border-white/10">
                    <p class="text-[10px] uppercase font-bold text-indigo-200">Snitt Rating</p>
                    <p id="avgScore" class="text-xl font-black">0.0 ★</p>
                </div>
            </div>
        </header>

        <main class="p-5 max-w-md mx-auto">
            <div class="flex p-1 bg-slate-200/50 rounded-2xl mb-6">
                <button onclick="switchTab('feed')" id="tabFeed" class="flex-1 py-3 rounded-xl text-sm font-black transition-all bg-indigo-600 text-white shadow-md">Oversikt</button>
                <button onclick="switchTab('add')" id="tabAdd" class="flex-1 py-3 rounded-xl text-sm font-black transition-all text-slate-500">Registrer</button>
            </div>

            <div id="sectionFeed" class="space-y-4">
                <div id="monthSelector" class="flex items-center justify-between mb-2 px-1">
                    <h3 class="font-black text-slate-800 text-sm uppercase tracking-wider">Siste transaksjoner</h3>
                </div>
                <div id="purchasesList" class="space-y-3">
                    </div>
            </div>

            <div id="sectionAdd" class="hidden">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100">
                    <h2 id="formTitle" class="text-xl font-black text-slate-800 mb-6">Ny registrering</h2>
                    <input type="hidden" id="editId">
                    <div class="space-y-4">
                        <input type="text" id="desc" placeholder="Hva har du kjøpt?" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-semibold focus:ring-2 ring-indigo-500">
                        <div class="flex gap-2">
                            <input type="number" id="price" placeholder="Pris" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none font-black text-lg text-indigo-600">
                            <select id="category" class="p-4 bg-slate-50 rounded-xl border-none outline-none font-bold text-sm text-slate-500">
                                <option value="Mat">🛒 Mat</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Bolig">🏠 Bolig</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Annet">✨ Annet</option>
                            </select>
                        </div>
                        <div class="text-center py-4 bg-slate-50 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Hvor nødvendig var dette?</p>
                            <div class="star-rating">
                                <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                                <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                                <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                                <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                                <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                            </div>
                        </div>
                        <button onclick="savePurchase()" id="btnSave" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg uppercase tracking-widest">Lagre</button>
                        <button onclick="cancelEdit()" id="btnCancel" class="hidden w-full text-slate-400 py-2 font-bold text-sm">Avbryt redigering</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // DIN CONFIG (Hentet fra bildet ditt)
        const firebaseConfig = {
            apiKey: "AIzaSyD8KhKw3-sMepEOJ2zaxEcH7Wnxvi0c580",
            authDomain: "mitt-forbruk-79b13.firebaseapp.com",
            projectId: "mitt-forbruk-79b13",
            storageBucket: "mitt-forbruk-79b13.firebasestorage.app",
            messagingSenderId: "383383948424",
            appId: "1:383383948424:web:dee99653e93b55d977a33d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        
const ALLOWED_EMAILS = ['bulutcollections@gmail.com', 'ayluh_18@hotmail.com'];

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && ALLOWED_EMAILS.includes(user.email)) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = user.displayName;
                startApp();
            } else if (user) {
                alert("Ingen tilgang.");
                signOut(auth);
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appContent').classList.add('hidden');
            }
        });

        function startApp() {
            onSnapshot(query(collection(db, "purchases"), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('purchasesList');
                list.innerHTML = '';
                let total = 0, rSum = 0, count = 0;
                const now = new Date();
                
                snap.forEach(dDoc => {
                    const p = dDoc.data(); const id = dDoc.id;
                    const date = new Date(p.createdAt);
                    
                    // Månedsoversikt-logikk (Denne måneden)
                    if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                        total += p.price;
                    }
                    rSum += p.myRating; count++;

                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-black text-slate-800 uppercase text-sm">${p.desc || 'Ingen beskrivelse'}</h3>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${p.category || 'Annet'} • ${p.buyer.split(' ')[0]} • ${date.toLocaleDateString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-indigo-600 text-md">${p.price.toLocaleString()} kr</p>
                                <div class="text-amber-400 text-[10px]">${"★".repeat(p.myRating)}</div>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
                            <div class="flex gap-4">
                                <button onclick="editMode('${id}', '${p.desc}', ${p.price}, '${p.category}', ${p.myRating})" class="text-slate-300 hover:text-indigo-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deletePurchase('${id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            ${p.buyer !== auth.currentUser.displayName && p.partnerRating === 0 ? 
                                `<div class="flex gap-1">
                                    ${[1,2,3,4,5].map(i => `<button onclick="ratePartner('${id}', ${i})" class="w-6 h-6 bg-slate-100 rounded-md text-[8px] font-bold">★${i}</button>`).join('')}
                                </div>` : 
                                `<p class="text-[9px] font-black text-slate-300 italic uppercase">Rating: ${"★".repeat(p.partnerRating || 0)}</p>`
                            }
                        </div>
                    `;
                    list.appendChild(card);
                });
                document.getElementById('totalMonth').innerText = total.toLocaleString() + " kr";
                document.getElementById('avgScore').innerText = count > 0 ? (rSum/count).toFixed(1) + " ★" : "0.0 ★";
                lucide.createIcons();
            });
        }

        window.savePurchase = async () => {
            const id = document.getElementById('editId').value;
            const desc = document.getElementById('desc').value;
            const price = parseFloat(document.getElementById('price').value);
            const category = document.getElementById('category').value;
            const rating = parseInt(document.querySelector('input[name="rating"]:checked')?.value || 0);

            if(!desc || !price || rating === 0) return alert("Fyll ut alt!");

            const data = {
                desc, price, category, myRating: rating,
                buyer: auth.currentUser.displayName,
                createdAt: id ? Date.now() : Date.now() // Behold dato eller oppdater
            };

            if(id) {
                await updateDoc(doc(db, "purchases", id), data);
                cancelEdit();
            } else {
                data.partnerRating = 0;
                await addDoc(collection(db, "purchases"), data);
            }

            document.getElementById('desc').value = '';
            document.getElementById('price').value = '';
            switchTab('feed');
        };

        window.editMode = (id, desc, price, category, rating) => {
            switchTab('add');
            document.getElementById('formTitle').innerText = "Endre registrering";
            document.getElementById('editId').value = id;
            document.getElementById('desc').value = desc;
            document.getElementById('price').value = price;
            document.getElementById('category').value = category;
            document.getElementById(`star${rating}`).checked = true;
            document.getElementById('btnSave').innerText = "Oppdater";
            document.getElementById('btnCancel').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('editId').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('price').value = '';
            document.getElementById('formTitle').innerText = "Ny registrering";
            document.getElementById('btnSave').innerText = "Lagre";
            document.getElementById('btnCancel').classList.add('hidden');
            switchTab('feed');
        };

        window.switchTab = (tab) => {
            const isFeed = tab === 'feed';
            document.getElementById('sectionFeed').classList.toggle('hidden', !isFeed);
            document.getElementById('sectionAdd').classList.toggle('hidden', isFeed);
            document.getElementById('tabFeed').className = isFeed ? "flex-1 py-3 rounded-xl text-sm font-black transition-all bg-indigo-600 text-white shadow-md" : "flex-1 py-3 rounded-xl text-sm font-black transition-all text-slate-500";
            document.getElementById('tabAdd').className = !isFeed ? "flex-1 py-3 rounded-xl text-sm font-black transition-all bg-indigo-600 text-white shadow-md" : "flex-1 py-3 rounded-xl text-sm font-black transition-all text-slate-500";
        };

        window.ratePartner = async (id, val) => { await updateDoc(doc(db, "purchases", id), { partnerRating: val }); };
        window.deletePurchase = async (id) => { if(confirm("Slette permanent?")) await deleteDoc(doc(db, "purchases", id)); };
        lucide.createIcons();
    </script>
</body>
</html>
